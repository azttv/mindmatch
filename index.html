                                            await fetchContextInsight(
                                                chatId,
                                                a.id,
                                            );
                                        // Only apply result if user still on same action/chat
                                        if (
                                            state.activeChatId === chatId &&
                                            state.activeContextAction === a.id
                                        ) {
                                            state.contextLoading = false;
                                            state.contextResult = result;
                                            renderChatBubbles();
                                        }
                                    },
                                },
                                [
                                    el(
                                        "span",
                                        { class: "neuron-context-action-icon" },
                                        a.icon,
                                    ),
                                    document.createTextNode(a.label),
                                ],
                            ),
                        );
                    });
                    panel.appendChild(actions);
                } else {
                    const response = el("div", {
                        class: "neuron-context-response",
                    });

                    if (state.contextLoading) {
                        response.appendChild(
                            el(
                                "div",
                                {
                                    class: "neuron-typing",
                                    style: "padding:8px 0",
                                },
                                [el("span"), el("span"), el("span")],
                            ),
                        );
                    } else if (state.contextResult) {
                        const insight = state.contextResult;
                        if (
                            state.activeContextAction === "suggest" &&
                            insight.options
                        ) {
                            response.appendChild(
                                el(
                                    "p",
                                    {},
                                    "Voici trois pistes selon le ton que tu veux donner :",
                                ),
                            );
                            insight.options.forEach((opt) => {
                                response.appendChild(
                                    el("div", { class: "suggestion" }, [
                                        el(
                                            "span",
                                            { class: "suggestion-label" },
                                            opt.label,
                                        ),
                                        document.createTextNode(opt.text),
                                    ]),
                                );
                            });
                        } else if (state.activeContextAction === "synapse") {
                            response.appendChild(
                                el("p", {}, insight.text || ""),
                            );
                            if (insight.verdict) {
                                response.appendChild(
                                    el(
                                        "div",
                                        { class: "synapse-line" },
                                        "⚡ " + insight.verdict,
                                    ),
                                );
                            }
                        } else {
                            response.appendChild(
                                el("p", {}, insight.text || ""),
                            );
                        }
                    } else {
                        response.appendChild(el("p", {}, "Neuron se calibre…"));
                    }

                    response.appendChild(
                        el(
                            "button",
                            {
                                class: "neuron-context-back",
                                onclick: () => {
                                    state.activeContextAction = null;
                                    state.contextLoading = false;
                                    state.contextResult = null;
                                    renderChatBubbles();
                                },
                            },
                            [
                                svgIcon(
                                    '<polyline points="15 18 9 12 15 6"/>',
                                    12,
                                    12,
                                    2.2,
                                ),
                                document.createTextNode("Autres analyses"),
                            ],
                        ),
                    );
                    panel.appendChild(response);
                }
                return panel;
            }

            /* =================================================================
   7. PROFILE TAB
================================================================= */
            function renderProfile() {
                const root = document.getElementById("profile-scroll");
                root.innerHTML = "";

                const hero = el("div", { class: "profile-hero" }, [
                    el(
                        "div",
                        { class: "profile-avatar-big" },
                        CURRENT_USER.initials,
                    ),
                    el(
                        "h2",
                        { class: "profile-name-big" },
                        `${CURRENT_USER.name}, ${CURRENT_USER.age}`,
                    ),
                    el("div", { class: "profile-meta" }, [
                        svgIcon(
                            '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
                            13,
                            13,
                        ),
                        document.createTextNode(CURRENT_USER.city),
                    ]),
                    el(
                        "p",
                        { class: "profile-tagline" },
                        `"${CURRENT_USER.tagline}"`,
                    ),
                ]);
                root.appendChild(hero);

                const passions = el("div", { class: "profile-section" }, [
                    el("h3", { class: "section-title" }, "Mes passions"),
                    (() => {
                        const grid = el("div", { class: "passion-grid" });
                        CURRENT_USER.passions.forEach((p) =>
                            grid.appendChild(
                                el("span", { class: "passion-pill" }, p),
                            ),
                        );
                        grid.appendChild(
                            el(
                                "span",
                                { class: "passion-pill passion-add" },
                                "+ Ajouter une passion",
                            ),
                        );
                        return grid;
                    })(),
                ]);
                root.appendChild(passions);

                const completion = el("div", { class: "profile-section" }, [
                    el("div", { class: "progress-head" }, [
                        el(
                            "h3",
                            { class: "section-title", style: "margin:0;" },
                            "Complétion du profil",
                        ),
                        el("div", { class: "progress-percent" }, "75%"),
                    ]),
                    el("div", { class: "progress-track" }, [
                        el("div", { class: "progress-fill" }),
                    ]),
                    el(
                        "p",
                        { class: "progress-caption" },
                        "Complète ton profil pour obtenir plus de matchs",
                    ),
                    (() => {
                        const list = el("div", { class: "checklist" });
                        [
                            { label: "Photo de profil", done: true },
                            { label: "Bio renseignée", done: true },
                            { label: "5 passions minimum", done: true },
                            { label: "Lier Spotify", done: false },
                            {
                                label: "Répondre aux 3 questions de personnalité",
                                done: false,
                            },
                        ].forEach((it) => {
                            list.appendChild(
                                el(
                                    "div",
                                    {
                                        class:
                                            "checklist-item " +
                                            (it.done ? "done" : "todo"),
                                    },
                                    [
                                        el(
                                            "div",
                                            { class: "checklist-icon" },
                                            it.done
                                                ? [
                                                      svgIcon(
                                                          '<polyline points="20 6 9 17 4 12"/>',
                                                          12,
                                                          12,
                                                          3,
                                                      ),
                                                  ]
                                                : [],
                                        ),
                                        document.createTextNode(it.label),
                                    ],
                                ),
                            );
                        });
                        return list;
                    })(),
                ]);
                root.appendChild(completion);

                const stats = el("div", { class: "profile-section" }, [
                    el("h3", { class: "section-title" }, "Mes stats"),
                    el("div", { class: "stats-grid" }, [
                        el("div", { class: "stat-card" }, [
                            el(
                                "div",
                                { class: "stat-value" },
                                String(CURRENT_USER.stats.matches),
                            ),
                            el("div", { class: "stat-label" }, "Matchs"),
                        ]),
                        el("div", { class: "stat-card" }, [
                            el(
                                "div",
                                { class: "stat-value" },
                                String(CURRENT_USER.stats.conversations),
                            ),
                            el("div", { class: "stat-label" }, "Conversations"),
                        ]),
                        el("div", { class: "stat-card" }, [
                            el(
                                "div",
                                { class: "stat-value" },
                                CURRENT_USER.stats.bestScore + "%",
                            ),
                            el("div", { class: "stat-label" }, "Score max"),
                        ]),
                    ]),
                ]);
                root.appendChild(stats);

                root.appendChild(
                    el("button", { class: "btn-logout" }, "Se déconnecter"),
                );
            }

            /* =================================================================
   8. INTERACTIONS
================================================================= */
            function initTabs() {
                document.querySelectorAll(".nav-btn").forEach((btn) => {
                    btn.addEventListener("click", () =>
                        switchTab(btn.dataset.tab),
                    );
                });
            }

            function switchTab(tab) {
                if (state.activeTab === tab) return;
                const btn = document.querySelector(
                    `.nav-btn[data-tab="${tab}"]`,
                );
                if (btn && btn.classList.contains("locked")) {
                    const brand = document.getElementById("brand-mascot");
                    if (brand) flashNeuronState(brand, "is-sending", 500);
                    return;
                }
                state.activeTab = tab;
                if (tab !== "messages") closeChat();
                document
                    .querySelectorAll(".tab-content")
                    .forEach((s) => s.classList.remove("active"));
                document.getElementById("tab-" + tab).classList.add("active");
                document
                    .querySelectorAll(".nav-btn")
                    .forEach((b) =>
                        b.classList.toggle("active", b.dataset.tab === tab),
                    );

                if (tab === "neuron") renderNeuron();
                if (tab === "match") renderMatch();
                if (tab === "messages") renderMessages();
                if (tab === "profile") renderProfile();
            }

            function initNeuronInput() {
                const form = document.getElementById("neuron-form");
                const input = document.getElementById("neuron-input");
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const text = input.value.trim();
                    if (!text) return;
                    input.value = "";
                    submitNeuronMessage(text);
                });
            }

            function initMatchSearch() {
                const input = document.getElementById("match-search");
                input.addEventListener("input", (e) => {
                    state.matchQuery = e.target.value;
                    renderMatch();
                });
            }

            function initChatInput() {
                document
                    .getElementById("chat-back")
                    .addEventListener("click", closeChat);
                const form = document.getElementById("chat-form");
                const input = document.getElementById("chat-input");
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const text = input.value.trim();
                    if (!text || !state.activeChatId) return;
                    const conv = CONVERSATIONS[state.activeChatId];
                    conv.messages.push({ from: "me", text });
                    const now = new Date();
                    conv.time =
                        now.getHours().toString().padStart(2, "0") +
                        ":" +
                        now.getMinutes().toString().padStart(2, "0");
                    input.value = "";
                    renderChatBubbles();
                    renderMessages();
                });
            }

            /* =================================================================
   9. INIT
================================================================= */
            function init() {
                renderNeuron();
                initTabs();
                initNeuronInput();
                initMatchSearch();
                initChatInput();
                computeUnread();
            }
            init();
        </script>
    </body>
</html>
