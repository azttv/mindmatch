                                row.style.transition = "all 220ms ease";
                                row.style.opacity = "0";
                                row.style.transform = "translateX(30px)";
                                setTimeout(() => {
                                    row.remove();
                                    if (!group.querySelector(".blocked-row")) {
                                        group.innerHTML = "";
                                        group.appendChild(
                                            el(
                                                "div",
                                                { class: "blocked-empty" },
                                                "Tu n'as bloqué personne.",
                                            ),
                                        );
                                    }
                                }, 220);
                            } else {
                                btn.disabled = false;
                                btn.textContent = "Débloquer";
                            }
                        });
                        row.appendChild(btn);
                        group.appendChild(row);
                    });
                });
                return root;
            }

            /* =================================================================
   9e. MESSAGING SYSTEM (Supabase-backed)
================================================================= */
            function formatChatTime(d) {
                const now = new Date();
                const sameDay = d.toDateString() === now.toDateString();
                if (sameDay)
                    return (
                        d.getHours().toString().padStart(2, "0") +
                        ":" +
                        d.getMinutes().toString().padStart(2, "0")
                    );
                const yesterday = new Date(now);
                yesterday.setDate(now.getDate() - 1);
                if (d.toDateString() === yesterday.toDateString())
                    return "Hier";
                return (
                    d.getDate().toString().padStart(2, "0") +
                    "/" +
                    (d.getMonth() + 1).toString().padStart(2, "0")
                );
            }
            function gradForId(id) {
                const gradients = [
                    "linear-gradient(135deg,#ff6b9d,#7c5ef7)",
                    "linear-gradient(135deg,#1e3a8a,#38bdf8)",
                    "linear-gradient(135deg,#be185d,#f472b6)",
                    "linear-gradient(135deg,#065f46,#10b981)",
                    "linear-gradient(135deg,#78350f,#7c5ef7)",
                    "linear-gradient(135deg,#fb7185,#f59e0b)",
                ];
                let h = 0;
                for (let i = 0; i < id.length; i++)
                    h = (h * 31 + id.charCodeAt(i)) | 0;
                return gradients[Math.abs(h) % gradients.length];
            }

            async function loadConversations() {
                if (!CURRENT_USER.id) return;
                // Clear in-memory
                for (const k in CONVERSATIONS) delete CONVERSATIONS[k];
                // Fetch all messages involving me
                const { data: msgs, error } = await sb
                    .from("messages")
                    .select(
                        "id, sender_id, recipient_id, content, created_at, read_at",
                    )
                    .or(
                        `sender_id.eq.${CURRENT_USER.id},recipient_id.eq.${CURRENT_USER.id}`,
                    )
                    .order("created_at", { ascending: true });
                if (error) {
                    console.error("[loadConversations]", error);
                    return;
                }
                // Group by other user id
                const partnerIds = new Set();
                (msgs || []).forEach((m) => {
                    const otherId =
                        m.sender_id === CURRENT_USER.id
                            ? m.recipient_id
                            : m.sender_id;
                    partnerIds.add(otherId);
                    if (!CONVERSATIONS[otherId]) {
                        CONVERSATIONS[otherId] = {
                            name: "?",
                            avatar_url: null,
                            grad: gradForId(otherId),
                            unread: 0,
                            time: "",
                            lastTs: 0,
                            messages: [],
                        };
                    }
                    const conv = CONVERSATIONS[otherId];
                    const from =
                        m.sender_id === CURRENT_USER.id ? "me" : "them";
                    conv.messages.push({ id: m.id, from, text: m.content });
                    const ts = new Date(m.created_at).getTime();
                    if (ts > conv.lastTs) {
                        conv.lastTs = ts;
                        conv.time = formatChatTime(new Date(m.created_at));
                    }
                    if (from === "them" && !m.read_at) conv.unread += 1;
                });
                // Fetch partner profiles
                if (partnerIds.size > 0) {
                    const ids = Array.from(partnerIds);
                    const { data: profiles } = await sb
                        .from("profiles")
                        .select("id, name, avatar_url")
                        .in("id", ids);
                    (profiles || []).forEach((p) => {
                        if (CONVERSATIONS[p.id]) {
                            CONVERSATIONS[p.id].name = p.name || "Utilisateur";
                            CONVERSATIONS[p.id].avatar_url =
                                p.avatar_url || null;
                        }
                    });
                }
                computeUnread();
                if (state.activeTab === "messages") renderMessages();
                // stats
                CURRENT_USER.stats.conversations =
                    Object.keys(CONVERSATIONS).length;
            }

            async function subscribeRealtime() {
                if (!CURRENT_USER.id) return;
                if (realtimeChannel) {
                    await sb.removeChannel(realtimeChannel);
                    realtimeChannel = null;
                }
                realtimeChannel = sb
                    .channel("messages-" + CURRENT_USER.id)
                    .on(
                        "postgres_changes",
                        {
                            event: "INSERT",
                            schema: "public",
                            table: "messages",
                            filter: `recipient_id=eq.${CURRENT_USER.id}`,
                        },
                        async (payload) => {
                            await handleIncomingMessage(payload.new);
                        },
                    )
                    .subscribe();
            }

            async function handleIncomingMessage(row) {
                const otherId = row.sender_id;
                if (!CONVERSATIONS[otherId]) {
                    CONVERSATIONS[otherId] = {
                        name: "…",
                        avatar_url: null,
                        grad: gradForId(otherId),
                        unread: 0,
                        time: "",
                        lastTs: 0,
                        messages: [],
                    };
                    // fetch partner profile
                    const { data: p } = await sb
                        .from("profiles")
                        .select("id, name, avatar_url")
                        .eq("id", otherId)
                        .maybeSingle();
                    if (p) {
                        CONVERSATIONS[otherId].name = p.name || "Utilisateur";
                        CONVERSATIONS[otherId].avatar_url =
                            p.avatar_url || null;
                    }
                }
                const conv = CONVERSATIONS[otherId];
                // avoid duplicates (in case optimistic)
                if (conv.messages.some((m) => m.id === row.id)) return;
                conv.messages.push({
                    id: row.id,
                    from: "them",
                    text: row.content,
                });
                const ts = new Date(row.created_at).getTime();
                conv.lastTs = ts;
                conv.time = formatChatTime(new Date(row.created_at));
                // if chat is open on this partner, auto-mark read
                if (state.activeChatId === otherId) {
                    await sb
                        .from("messages")
                        .update({ read_at: new Date().toISOString() })
                        .eq("id", row.id);
                    renderChatBubbles();
                } else {
                    conv.unread += 1;
                }
                computeUnread();
                if (state.activeTab === "messages") renderMessages();
            }

            /* =================================================================
   9f. AVATAR UPLOAD (Supabase Storage, unlocked at ≥50% profile)
================================================================= */
            async function handleAvatarUpload(file) {
                if (!file || !CURRENT_USER.id) return;
                if (!/^image\//.test(file.type)) {
                    alert("Seules les images sont acceptées.");
                    return;
                }
                if (file.size > 4 * 1024 * 1024) {
                    alert("Fichier trop lourd (max 4 Mo).");
                    return;
                }
                const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
                const path = `${CURRENT_USER.id}/avatar.${ext}`;
                const { error: upErr } = await sb.storage
                    .from("avatars")
                    .upload(path, file, { upsert: true, cacheControl: "3600" });
                if (upErr) {
                    alert("Upload échoué : " + upErr.message);
                    return;
                }
                const { data: urlData } = sb.storage
                    .from("avatars")
                    .getPublicUrl(path);
                const url = urlData.publicUrl + "?v=" + Date.now(); // bust cache
                CURRENT_USER.avatar_url = url;
                await sb
                    .from("profiles")
                    .update({
                        avatar_url: url,
                        updated_at: new Date().toISOString(),
                    })
                    .eq("id", CURRENT_USER.id);
                renderProfile();
            }
            function openAvatarPicker() {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "image/*";
                input.addEventListener("change", (e) => {
                    const f = e.target.files && e.target.files[0];
                    if (f) handleAvatarUpload(f);
                });
                input.click();
            }

            /* =================================================================
   DEBUG MODE — konami code (↑↑↓↓←→←→BA) toggles a left-side console.
================================================================= */
            const DBG = {
                enabled: false,
                panel: null,
                logEl: null,
                stateEl: null,
                konamiSeq: [38, 38, 40, 40, 37, 39, 37, 39, 66, 65],
                konamiPos: 0,
                micStream: null,
                micAnalyser: null,
                rafId: null,
                stateTimer: null,
                bootBuffer: [],
                lastInterim: "",
                interimTimer: null,
                maxLines: 500,
            };

            function dbgLog(category, text, data) {
                // Mirror to console always, so logs are also in DevTools.
                try {
                    if (data !== undefined)
                        console.log(`[${category}]`, text, data);
                    else console.log(`[${category}]`, text);
                } catch (_) {}
                // Buffer if panel not open yet, so first toggle replays history.
                if (!DBG.enabled || !DBG.logEl) {
                    if (DBG.bootBuffer.length < 200) {
                        DBG.bootBuffer.push([Date.now(), category, text, data]);
                    }
                    return;
                }
                _dbgWriteLine(Date.now(), category, text, data);
            }

            function _dbgWriteLine(ts, category, text, data) {
                const d = new Date(ts);
                const tsStr =
                    d.toLocaleTimeString("fr-FR", { hour12: false }) +
                    "." +
                    String(ts % 1000).padStart(3, "0");
                let body = text;
                if (data !== undefined) {
                    let s;
                    try {
                        s =
                            typeof data === "string"
                                ? data
                                : JSON.stringify(data);
                    } catch (_) {
                        s = String(data);
                    }
                    body += "  " + s;
                }
                const line = document.createElement("div");
                line.className = "dbg-line " + category;
                const tsSpan = document.createElement("span");
                tsSpan.className = "ts";
                tsSpan.textContent = tsStr;
                line.appendChild(tsSpan);
                line.appendChild(document.createTextNode(body));
                DBG.logEl.appendChild(line);
                while (DBG.logEl.childElementCount > DBG.maxLines) {
                    DBG.logEl.firstChild.remove();
                }
                DBG.logEl.scrollTop = DBG.logEl.scrollHeight;
            }

            function dbgToggle() {
                DBG.enabled = !DBG.enabled;
                if (DBG.enabled) dbgOpen();
                else dbgClose();
                _dbgToast(DBG.enabled ? "DEBUG ON" : "DEBUG OFF");
            }

            function _dbgToast(text) {
                const t = document.createElement("div");
                t.className = "dbg-toast";
                t.textContent = text;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 1700);
            }

            function dbgOpen() {
                if (DBG.panel) return;
                const p = document.createElement("div");
                p.className = "dbg-panel";
                p.innerHTML = `
                    <div class="dbg-header">
                        <div>
                            <div class="dbg-title">DEBUG</div>
                            <div class="dbg-sub">konami → toggle • Esc closes</div>
                        </div>
                        <div class="dbg-actions">
                            <button class="dbg-btn" id="dbg-ping">ping /tts</button>
                            <button class="dbg-btn" id="dbg-clear">clear</button>
                            <button class="dbg-btn" id="dbg-close">×</button>
                        </div>
                    </div>
                    <div class="dbg-mic">
                        <div class="dbg-mic-label">
                            <span>mic level</span>
                            <span id="dbg-mic-status">stopped</span>
                        </div>
                        <div class="dbg-mic-track">
                            <div class="dbg-mic-bar" id="dbg-mic-bar"></div>
                        </div>
                    </div>
                    <div class="dbg-state" id="dbg-state"></div>
                    <div class="dbg-log" id="dbg-log"></div>
                `;
                document.body.appendChild(p);
                DBG.panel = p;
                DBG.logEl = p.querySelector("#dbg-log");
                DBG.stateEl = p.querySelector("#dbg-state");

                p.querySelector("#dbg-clear").addEventListener("click", () => {
                    if (DBG.logEl) DBG.logEl.innerHTML = "";
                });
                p.querySelector("#dbg-close").addEventListener(
                    "click",
                    dbgToggle,
                );
                p.querySelector("#dbg-ping").addEventListener(
                    "click",
                    dbgPingTTS,
                );

                // Replay buffered logs so the panel shows boot-time events too.
                const buf = DBG.bootBuffer;
                DBG.bootBuffer = [];
                buf.forEach((row) => _dbgWriteLine(...row));

                dbgRefreshState();
                DBG.stateTimer = setInterval(dbgRefreshState, 250);
                dbgStartMicViz();
                dbgLog("system", "panel opened");
            }

            function dbgClose() {
                if (!DBG.panel) return;
                if (DBG.stateTimer) {
                    clearInterval(DBG.stateTimer);
                    DBG.stateTimer = null;
                }
                dbgStopMicViz();
                DBG.panel.remove();
                DBG.panel = null;
                DBG.logEl = null;
                DBG.stateEl = null;
            }

            function dbgRefreshState() {
                if (!DBG.stateEl) return;
                const rows = [
                    ["chatMode", VOICE.chatMode],
                    ["listening", VOICE.listening],
                    ["micMuted", VOICE.micMuted],
                    ["speakerOn", VOICE.speakerOn],
                    ["amberSpeaking", !!VOICE.currentAudio],
                    ["sttSupported", VOICE.sttSupported],
                    ["pendingFinal", (VOICE.pendingFinal || "").length + " ch"],
                    ["audioCtx", VOICE.audioCtx ? VOICE.audioCtx.state : "—"],
                    ["worker", WORKER_URL],
                    ["voice_id", VOICE.ttsVoice || "(default)"],
                ];
                DBG.stateEl.innerHTML = rows
                    .map(([k, v]) => {
                        let cls = "v";
                        if (v === true) cls += " t";
                        if (v === false) cls += " f";
                        return `<span class="k">${k}</span><span class="${cls}">${v}</span>`;
                    })
                    .join("");
            }

            async function dbgStartMicViz() {
                const statusEl = document.getElementById("dbg-mic-status");
                if (DBG.micStream) return;
                try {
                    DBG.micStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                        },
                    });
                    const ctx = ensureAudioCtx();
                    if (!ctx) {
                        if (statusEl) statusEl.textContent = "no audioCtx";
                        return;
                    }
                    const src = ctx.createMediaStreamSource(DBG.micStream);
                    const a = ctx.createAnalyser();
                    a.fftSize = 128;
                    a.smoothingTimeConstant = 0.6;
                    src.connect(a);
                    DBG.micAnalyser = a;
                    if (statusEl) statusEl.textContent = "live";
                    const data = new Uint8Array(a.fftSize);
                    const bar = document.getElementById("dbg-mic-bar");
                    function tick() {
                        if (!DBG.enabled || !DBG.micAnalyser) return;
                        DBG.micAnalyser.getByteTimeDomainData(data);
                        let sum = 0;
                        for (let i = 0; i < data.length; i++) {
                            const v = (data[i] - 128) / 128;
                            sum += v * v;
                        }
                        const rms = Math.sqrt(sum / data.length);
                        const pct = Math.min(100, Math.floor(rms * 380));
                        if (bar) bar.style.width = pct + "%";
                        DBG.rafId = requestAnimationFrame(tick);
                    }
                    tick();
                } catch (e) {
                    if (statusEl) statusEl.textContent = "error: " + e.name;
                    dbgLog("error", "mic viz failed", e.message);
                }
            }

            function dbgStopMicViz() {
                if (DBG.rafId) {
                    cancelAnimationFrame(DBG.rafId);
                    DBG.rafId = null;
                }
                if (DBG.micStream) {
                    DBG.micStream.getTracks().forEach((t) => t.stop());
                    DBG.micStream = null;
                }
                DBG.micAnalyser = null;
                const bar = document.getElementById("dbg-mic-bar");
                if (bar) bar.style.width = "0%";
            }

            async function dbgPingTTS() {
                const url = WORKER_URL.replace(/\/$/, "") + "/tts";
                dbgLog("system", "ping → " + url);
                const t0 = performance.now();
                try {
                    const r = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text: "Test débug." }),
                    });
                    const dt = Math.round(performance.now() - t0);
                    if (!r.ok) {
                        const t = await r.text().catch(() => "");
                        dbgLog(
                            "error",
                            `ping HTTP ${r.status} (${dt}ms)`,
                            t.slice(0, 300),
                        );
                    } else {
                        const b = await r.blob();
                        dbgLog("tts", `ping OK ${b.size}B (${dt}ms)`);
                    }
                } catch (e) {
                    dbgLog("error", "ping threw", e.message);
                }
            }

            function dbgInit() {
                document.addEventListener("keydown", (e) => {
                    // Ignore key events while typing in a field (so the konami
                    // code doesn't fire accidentally).
                    const tag = (e.target && e.target.tagName) || "";
                    if (
                        tag === "INPUT" ||
                        tag === "TEXTAREA" ||
                        (e.target && e.target.isContentEditable)
                    ) {
                        DBG.konamiPos = 0;
                        return;
                    }
                    const wanted = DBG.konamiSeq[DBG.konamiPos];
                    if (e.keyCode === wanted) {
                        DBG.konamiPos++;
                        if (DBG.konamiPos === DBG.konamiSeq.length) {
                            DBG.konamiPos = 0;
                            dbgToggle();
                        }
                    } else {
                        DBG.konamiPos = 0;
                    }
                    if (e.key === "Escape" && DBG.enabled) {
                        dbgToggle();
                    }
                });
            }

            /* =================================================================
   10. INIT
================================================================= */
            async function init() {
                dbgInit();
                initAuthUI();
                initTabs();
                initNeuronInput();
                initVoice();
                initMatchSearch();
                initChatInput();
                document
                    .getElementById("btn-settings")
                    .addEventListener("click", openSettings);
                document
                    .getElementById("settings-back")
                    .addEventListener("click", settingsBack);
                try {
                    if (
                        !sb ||
                        !SUPABASE_URL ||
                        SUPABASE_URL.startsWith("YOUR_")
                    ) {
                        throw new Error(
                            "Supabase non configuré (URL/ANON_KEY manquants).",
                        );
                    }
                    // Session check
                    const { data, error } = await sb.auth.getSession();
                    if (error) throw error;
                    if (data && data.session) {
                        await bootstrapSession(data.session);
                    } else {
                        showAuth();
                    }
                } catch (err) {
                    console.error("[init fatal]", err);
                    showAuth();
                    setAuthMessage(
                        "error",
                        "Erreur init : " + (err.message || err),
                    );
                }
                // React to OAuth redirect / sign-out from other tabs
                sb.auth.onAuthStateChange(async (event, session) => {
                    if (
                        event === "SIGNED_IN" &&
                        session &&
                        CURRENT_USER.id !== session.user.id
                    ) {
                        await bootstrapSession(session);
                    } else if (event === "SIGNED_OUT") {
                        CURRENT_USER.id = null;
                        showAuth();
                    }
                });
            }
            if (
                window.__gateReady &&
                typeof window.__gateReady.then === "function"
            ) {
                window.__gateReady.then(init);
            } else {
                init();
            }
        </script>
