                            onclick: (e) => { e.stopPropagation(); toggleContextPanel(idx); },
                        });
                        btn.appendChild(neuronMascotSVG(18));

            }

            function toggleContextPanel(idx) {
                if (state.activeContextMsgIdx === idx) {
                    state.activeContextMsgIdx = null; state.activeContextAction = null; state.contextLoading = false; state.contextResult = null;
                } else {
                    state.activeContextMsgIdx = idx; state.activeContextAction = null; state.contextLoading = false; state.contextResult = null;
                }
                renderChatBubbles();

                                const chatId = state.activeChatId;
                                const result = await fetchContextInsight(chatId, a.id);
                                if (state.activeChatId === chatId && state.activeContextAction === a.id) {
                                    state.contextLoading = false; state.contextResult = result; renderChatBubbles();
                                }

            function computeProfileCompletion() {
                let score = 0;
                if (CURRENT_USER.name) score += 20;
                if (CURRENT_USER.tagline) score += 20;

            /* =================================================================

================================================================= */
            function initTabs() {
                document.querySelectorAll(".nav-btn").forEach((btn) => { btn.addEventListener("click", () => switchTab(btn.dataset.tab)); });
            }
            function switchTab(tab) {
                if (state.activeTab === tab) return;
                const btn = document.querySelector(`.nav-btn[data-tab="${tab}"]`);
                if (btn && btn.classList.contains("locked")) { flashNeuronState(document.getElementById("brand-mascot"), "is-sending", 500); return; }
                state.activeTab = tab;
                if (tab !== "messages") closeChat();
                document.querySelectorAll(".tab-content").forEach((s) => s.classList.remove("active"));
                document.getElementById("tab-" + tab).classList.add("active");
                document.querySelectorAll(".nav-btn").forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
                if (tab === "neuron") renderNeuron();
                if (tab === "match") renderMatch();
                if (tab === "messages") renderMessages();
                if (tab === "profile") renderProfile();
            }
            function initNeuronInput() {
                const form = document.getElementById("neuron-form");
                const input = document.getElementById("neuron-input");
                form.addEventListener("submit", (e) => { e.preventDefault(); const text = input.value.trim(); if (!text) return; input.value = ""; submitNeuronMessage(text); });
            }
            function initMatchSearch() {
                document.getElementById("match-search").addEventListener("input", (e) => { state.matchQuery = e.target.value; renderMatch(); });
            }
            function initChatInput() {
                document.getElementById("chat-back").addEventListener("click", closeChat);
                const form = document.getElementById("chat-form");
                const input = document.getElementById("chat-input");
                form.addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const text = input.value.trim();
                    if (!text || !state.activeChatId || !CURRENT_USER.id) return;
                    const otherId = state.activeChatId;
                    const conv = CONVERSATIONS[otherId];
                    if (!conv) return;
                    input.value = "";
                    // optimistic push
                    const now = new Date();
                    const tempId = "tmp-" + Date.now();
                    conv.messages.push({ id: tempId, from: "me", text });
                    conv.time = formatChatTime(now);
                    conv.lastTs = now.getTime();
                    renderChatBubbles();
                    renderMessages();
                    // persist
                    const { data, error } = await sb.from("messages").insert({
                        sender_id: CURRENT_USER.id,
                        recipient_id: otherId,
                        content: text,
                    }).select().single();
                    if (error) { console.error("[message send]", error); return; }
                    // swap temp id with real
                    const idx = conv.messages.findIndex((m) => m.id === tempId);
                    if (idx >= 0) conv.messages[idx].id = data.id;
                });
            }

                    ? "Connecte-toi pour retrouver Amber et tes connexions."
                    : "Crée ton compte et laisse Amber cartographier ton univers.";

                document.getElementById("auth-confirm-wrap").style.display = isLogin ? "none" : "flex";
                document.getElementById("auth-password").setAttribute("autocomplete", isLogin ? "current-password" : "new-password");
                document.getElementById("auth-switch-row").innerHTML = isLogin

                    : 'Déjà un compte ? <button class="auth-switch-link" id="auth-switch-btn" type="button">Se connecter</button>';

            }

            async function handleAuthSubmit(e) {
                e.preventDefault();
                setAuthMessage(null, "");
                const btn = document.getElementById("auth-submit");
                const email = document.getElementById("auth-email").value.trim();
                const password = document.getElementById("auth-password").value;
                btn.disabled = true;
                btn.textContent = "Patiente…";
                try {
                    if (authMode === "register") {
                        const confirm = document.getElementById("auth-confirm").value;
                        if (password !== confirm) throw new Error("Les mots de passe ne correspondent pas.");
                        if (password.length < 6) throw new Error("6 caractères minimum.");
                        const { data, error } = await sb.auth.signUp({
                            email, password,
                            options: { emailRedirectTo: window.location.origin + window.location.pathname },
                        });
                        if (error) throw error;
                        if (data.user && !data.session) {
                            setAuthMessage("success", "Email envoyé ! Clique sur le lien pour confirmer ton compte, puis reviens te connecter.");
                            btn.disabled = false;
                            btn.textContent = "Créer mon compte";
                            return;
                        }
                        // auto-signed-in (if email confirm disabled in Supabase)
                        await bootstrapSession(data.session);
                    } else {
                        const { data, error } = await sb.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        await bootstrapSession(data.session);
                    }
                } catch (err) {
                    const msg = (err && err.message) || String(err);
                    setAuthMessage("error", translateAuthError(msg));
                    btn.disabled = false;
                    btn.textContent = authMode === "login" ? "Se connecter" : "Créer mon compte";
                }
            }
            function translateAuthError(msg) {
                if (/invalid login/i.test(msg)) return "Email ou mot de passe incorrect.";
                if (/user already registered/i.test(msg)) return "Cet email est déjà utilisé.";
                if (/email not confirmed/i.test(msg)) return "Email non confirmé. Vérifie ta boîte mail.";
                if (/rate limit/i.test(msg)) return "Trop de tentatives. Réessaie plus tard.";
                return msg;
            }

            async function handleOAuth(provider) {
                setAuthMessage(null, "");
                const { error } = await sb.auth.signInWithOAuth({
                    provider,
                    options: { redirectTo: window.location.origin + window.location.pathname },
                });
                if (error) setAuthMessage("error", error.message);
            }

            async function handleLogout() {
                try {
                    if (state.saveTimer) { clearTimeout(state.saveTimer); state.saveTimer = null; }
                    await saveConversation(); // flush
                } catch (e) { /* ignore */ }
                if (realtimeChannel) { try { await sb.removeChannel(realtimeChannel); } catch (e) {} realtimeChannel = null; }
                await sb.auth.signOut();
                // hard reset
                CURRENT_USER = { id: null, email: null, name: "", age: null, city: "", tagline: "", passions: [], initials: "?", phone: "", isPro: false, avatar_url: "", stats: { matches: 0, conversations: 0, bestScore: 0 } };
                for (const k in CONVERSATIONS) delete CONVERSATIONS[k];
                state.neuron = { messages: [], inConversation: false, exchanges: 0, onboardingDone: false };
                state.isNewUser = true;
                state.activeTab = "neuron";
                document.querySelectorAll(".tab-content").forEach((s) => s.classList.remove("active"));
                document.getElementById("tab-neuron").classList.add("active");
                document.querySelectorAll(".nav-btn").forEach((b) => b.classList.toggle("active", b.dataset.tab === "neuron"));
                document.querySelectorAll(".nav-btn").forEach((b) => { if (b.dataset.tab !== "neuron") b.classList.add("locked"); });
                authMode = "login";
                // reset auth form UI
                document.getElementById("auth-email").value = "";
                document.getElementById("auth-password").value = "";
                const confirm = document.getElementById("auth-confirm");
                if (confirm) confirm.value = "";
                document.getElementById("auth-title").textContent = "Content de te revoir";
                document.getElementById("auth-subtitle").textContent = "Connecte-toi pour retrouver Amber et tes connexions.";
                document.getElementById("auth-submit").disabled = false;
                document.getElementById("auth-submit").textContent = "Se connecter";
                document.getElementById("auth-confirm-wrap").style.display = "none";
                document.getElementById("auth-switch-row").innerHTML = 'Nouveau ? <button class="auth-switch-link" id="auth-switch-btn" type="button">Créer un compte</button>';
                document.getElementById("auth-switch-btn").addEventListener("click", toggleAuthMode);
                setAuthMessage(null, "");
                showAuth();
            }

            async function bootstrapSession(session) {
                if (!session || !session.user) { showAuth(); return; }
                try {
                    CURRENT_USER.id = session.user.id;
                    CURRENT_USER.email = session.user.email || "";
                    // Load or create profile row
                    const { data: profile, error: pErr } = await sb
                        .from("profiles")
                        .select("*")
                        .eq("id", CURRENT_USER.id)
                        .maybeSingle();
                    if (pErr) console.error("[profiles select]", pErr);
                    if (profile) {
                        CURRENT_USER.name = profile.name || "";
                        CURRENT_USER.age = profile.age || null;
                        CURRENT_USER.city = profile.city || "";
                        CURRENT_USER.tagline = profile.tagline || "";
                        CURRENT_USER.passions = Array.isArray(profile.passions) ? profile.passions : [];
                        CURRENT_USER.isPro = !!profile.is_pro;
                        CURRENT_USER.phone = session.user.phone || profile.phone || "";
                        CURRENT_USER.avatar_url = profile.avatar_url || "";
                    } else {
                        const { error: insErr } = await sb.from("profiles").insert({ id: CURRENT_USER.id, email: CURRENT_USER.email });
                        if (insErr) console.error("[profiles insert]", insErr);
                    }
                    // Load conversation
                    const { data: conv, error: cErr } = await sb
                        .from("conversations")
                        .select("messages, exchanges")
                        .eq("user_id", CURRENT_USER.id)
                        .maybeSingle();
                    if (cErr) console.error("[conversations select]", cErr);
                    if (conv && Array.isArray(conv.messages) && conv.messages.length > 0) {
                        state.isNewUser = false;
                        state.neuron.messages = conv.messages;
                        state.neuron.exchanges = conv.exchanges || 0;
                        state.neuron.inConversation = true;
                        state.neuron.onboardingDone = true;
                        unlockTabs();
                    } else {
                        state.isNewUser = true;
                        // First-time user: Amber sends M1 automatically
                        state.neuron.messages = [{ from: "neuron", text: M1_MESSAGE }];
                        state.neuron.inConversation = true;
                        await saveConversation();
                    }
                    hideAuth();
                    renderNeuron();
                    renderProfile();
                    computeUnread();
                    // Load real messaging data + subscribe
                    await loadConversations();
                    await subscribeRealtime();
                } catch (err) {
                    console.error("[bootstrapSession fatal]", err);
                    setAuthMessage("error", "Erreur chargement : " + (err.message || err) + " — vérifie la console.");
                    showAuth();
                }
            }

            function scheduleSave() {
                if (state.saveTimer) clearTimeout(state.saveTimer);
                state.saveTimer = setTimeout(saveConversation, 800);
            }
            async function saveConversation() {
                if (!CURRENT_USER.id) return;
                await sb.from("conversations").upsert({
                    user_id: CURRENT_USER.id,
                    messages: state.neuron.messages,
                    exchanges: state.neuron.exchanges,
                    updated_at: new Date().toISOString(),
                }, { onConflict: "user_id" });
            }

            async function extractProfileFromChat() {
                if (!CURRENT_USER.id) return;
                const transcript = state.neuron.messages
                    .map((m) => `${m.from === "user" ? "User" : "Amber"}: ${Array.isArray(m.text) ? m.text.join(" ") : m.text}`)
                    .join("\n");
                const prompt = `À partir de cette conversation entre Amber et un user, extrais le profil de l'user en JSON strict (pas de markdown, pas de backticks). Schéma exact : {"name":"string ou vide","city":"string ou vide","tagline":"phrase courte qui résume l'user d'après ses obsessions, ou vide","passions":["string avec emoji si pertinent", ...]}. Règles : ne pas inventer ce qui n'est pas dans la conversation. Laisser vide si non dit. Passions = références précises mentionnées (artistes, œuvres, sujets, projets), max 8. Tagline = phrase de bio en 1 ligne max 60 caractères, inspirée par les obsessions réelles de l'user, ou vide si trop tôt.\n\nConversation:\n${transcript}`;
                const raw = await callGPT(
                    [{ role: "user", content: prompt }],
                    "Tu es un extracteur de profil. Tu réponds UNIQUEMENT en JSON valide."
                );
                let parsed;
                try {
                    parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());
                } catch { return; }
                let changed = false;
                if (parsed.name && typeof parsed.name === "string" && parsed.name !== CURRENT_USER.name) { CURRENT_USER.name = parsed.name; changed = true; }
                if (parsed.city && typeof parsed.city === "string" && parsed.city !== CURRENT_USER.city) { CURRENT_USER.city = parsed.city; changed = true; }
                if (parsed.tagline && typeof parsed.tagline === "string" && parsed.tagline !== CURRENT_USER.tagline) { CURRENT_USER.tagline = parsed.tagline; changed = true; }
                if (Array.isArray(parsed.passions)) {
                    const clean = parsed.passions.filter((p) => typeof p === "string" && p.trim()).slice(0, 8);
                    if (JSON.stringify(clean) !== JSON.stringify(CURRENT_USER.passions)) { CURRENT_USER.passions = clean; changed = true; }
                }
                if (changed) {
                    await sb.from("profiles").upsert({
                        id: CURRENT_USER.id,
                        email: CURRENT_USER.email,
                        name: CURRENT_USER.name || null,
                        city: CURRENT_USER.city || null,
                        tagline: CURRENT_USER.tagline || null,
                        passions: CURRENT_USER.passions,
                        updated_at: new Date().toISOString(),
                    }, { onConflict: "id" });
                    if (state.activeTab === "profile") renderProfile();
                }
            }

            /* --- PHONE SETUP --- */
            function modalPhoneSetup() {
                let step = CURRENT_USER.phone ? "remove" : "enter";
                let pendingPhone = "";
                openModal((modal, close) => {
                    const render = () => {
                        modal.innerHTML = "";
                        if (step === "remove") {
                            modal.appendChild(el("h3", { class: "modal-title" }, "Numéro de téléphone"));
                            modal.appendChild(el("p", { class: "modal-desc" }, "Ton numéro actuel : " + CURRENT_USER.phone));
                            const actions = el("div", { class: "modal-actions" });
                            const cancel = el("button", { class: "modal-btn cancel", type: "button" }, "Fermer");
                            cancel.addEventListener("click", close);
                            const change = el("button", { class: "modal-btn primary", type: "button" }, "Changer");
                            change.addEventListener("click", () => { step = "enter"; render(); });
                            actions.appendChild(cancel);
                            actions.appendChild(change);
                            modal.appendChild(actions);
                        } else if (step === "enter") {
                            modal.appendChild(el("h3", { class: "modal-title" }, "Ajouter un numéro"));
                            modal.appendChild(el("p", { class: "modal-desc" }, "Format international, ex : +33612345678"));
                            const input = el("input", { class: "modal-input", type: "tel", placeholder: "+33...", value: pendingPhone });
                            modal.appendChild(input);
                            const err = el("div", { style: "display:none" });
                            modal.appendChild(err);
                            const actions = el("div", { class: "modal-actions" });
                            const cancel = el("button", { class: "modal-btn cancel", type: "button" }, "Annuler");
                            cancel.addEventListener("click", close);
                            const submit = el("button", { class: "modal-btn primary", type: "button" }, "Envoyer le code");
                            submit.addEventListener("click", async () => {
                                const phone = input.value.trim();
                                if (!/^\+\d{6,15}$/.test(phone)) {
                                    err.className = "modal-err"; err.style.display = ""; err.textContent = "Numéro invalide.";
                                    return;
                                }
                                submit.disabled = true; submit.textContent = "Envoi…";
                                const { error } = await sb.auth.updateUser({ phone });
                                if (error) {
                                    err.className = "modal-err"; err.style.display = ""; err.textContent = error.message;
                                    submit.disabled = false; submit.textContent = "Envoyer le code";
                                    return;
                                }
                                pendingPhone = phone; step = "verify"; render();
                            });
                            actions.appendChild(cancel);
                            actions.appendChild(submit);
                            modal.appendChild(actions);
                        } else if (step === "verify") {
                            modal.appendChild(el("h3", { class: "modal-title" }, "Vérification"));
                            modal.appendChild(el("p", { class: "modal-desc" }, "Entre le code à 6 chiffres reçu au " + pendingPhone));
                            const input = el("input", { class: "modal-input", type: "text", inputmode: "numeric", maxlength: "6", placeholder: "123456" });
                            modal.appendChild(input);
                            const err = el("div", { style: "display:none" });
                            modal.appendChild(err);
                            const actions = el("div", { class: "modal-actions" });
                            const cancel = el("button", { class: "modal-btn cancel", type: "button" }, "Annuler");
                            cancel.addEventListener("click", close);
                            const submit = el("button", { class: "modal-btn primary", type: "button" }, "Valider");
                            submit.addEventListener("click", async () => {
                                const token = input.value.trim();
                                if (!/^\d{6}$/.test(token)) {
                                    err.className = "modal-err"; err.style.display = ""; err.textContent = "Code à 6 chiffres requis.";
                                    return;
                                }
                                submit.disabled = true; submit.textContent = "Validation…";
                                const { error } = await sb.auth.verifyOtp({ phone: pendingPhone, token, type: "phone_change" });
                                if (error) {
                                    err.className = "modal-err"; err.style.display = ""; err.textContent = error.message;
                                    submit.disabled = false; submit.textContent = "Valider";
                                    return;
                                }
                                CURRENT_USER.phone = pendingPhone;
                                if (CURRENT_USER.id) await sb.from("profiles").update({ phone: pendingPhone }).eq("id", CURRENT_USER.id);
                                close();
                                renderSettings();
                            });
                            actions.appendChild(cancel);
                            actions.appendChild(submit);
                            modal.appendChild(actions);
                        }
                    };
                    render();
                });
            }

                        msg.style.display = "none";
                        if (nw.value.length < 6) { msg.className = "modal-err"; msg.style.display = ""; msg.textContent = "6 caractères minimum."; return; }
                        if (nw.value !== nw2.value) { msg.className = "modal-err"; msg.style.display = ""; msg.textContent = "Les deux champs ne correspondent pas."; return; }
                        submit.disabled = true; submit.textContent = "Vérification…";
                        // verify current
                        const { error: siErr } = await sb.auth.signInWithPassword({ email: CURRENT_USER.email, password: cur.value });
                        if (siErr) {
                            msg.className = "modal-err"; msg.style.display = ""; msg.textContent = "Mot de passe actuel incorrect.";
                            submit.disabled = false; submit.textContent = "Mettre à jour";
                            return;
                        }
                        submit.textContent = "Mise à jour…";
                        const { error: upErr } = await sb.auth.updateUser({ password: nw.value });
                        if (upErr) {
                            msg.className = "modal-err"; msg.style.display = ""; msg.textContent = upErr.message;
                            submit.disabled = false; submit.textContent = "Mettre à jour";
                            return;
                        }
                        msg.className = "modal-ok"; msg.style.display = ""; msg.textContent = "Mot de passe mis à jour.";
                        submit.textContent = "OK";
                        setTimeout(close, 1200);
                    });
                    actions.appendChild(cancel); actions.appendChild(submit);
                    modal.appendChild(actions);
                });
            }

            /* --- AUTHENTICATOR (TOTP) --- */
            async function modalAuthenticator() {
                // Check if TOTP factor exists
                const { data: factorData } = await sb.auth.mfa.listFactors();
                const existing = factorData && factorData.totp && factorData.totp.find((f) => f.status === "verified");
                if (existing) {
                    // remove flow
                    openModal((modal, close) => {
                        modal.appendChild(el("h3", { class: "modal-title" }, "Désactiver l'authentificateur"));
                        modal.appendChild(el("p", { class: "modal-desc" }, "Confirme pour supprimer l'authentificateur lié à ce compte. Tu pourras en reconfigurer un après."));
                        const msg = el("div", { style: "display:none" });
                        modal.appendChild(msg);
                        const actions = el("div", { class: "modal-actions" });
                        const cancel = el("button", { class: "modal-btn cancel", type: "button" }, "Annuler");
                        cancel.addEventListener("click", close);
                        const submit = el("button", { class: "modal-btn danger", type: "button" }, "Désactiver");
                        submit.addEventListener("click", async () => {
                            submit.disabled = true; submit.textContent = "…";
                            const { error } = await sb.auth.mfa.unenroll({ factorId: existing.id });
                            if (error) {
                                msg.className = "modal-err"; msg.style.display = ""; msg.textContent = error.message;
                                submit.disabled = false; submit.textContent = "Désactiver";
                                return;
                            }
                            close();
                        });
                        actions.appendChild(cancel); actions.appendChild(submit);
                        modal.appendChild(actions);
                    });
                    return;
                }
                // enroll flow
                const { data: enrollData, error: enrollErr } = await sb.auth.mfa.enroll({ factorType: "totp" });
                if (enrollErr) { alert(enrollErr.message); return; }
                const factorId = enrollData.id;
                const qr = enrollData.totp.qr_code;
                const secret = enrollData.totp.secret;
                const { data: chData, error: chErr } = await sb.auth.mfa.challenge({ factorId });
                if (chErr) { alert(chErr.message); return; }
                const challengeId = chData.id;
                openModal((modal, close) => {
                    modal.appendChild(el("h3", { class: "modal-title" }, "Configurer l'authentificateur"));
                    modal.appendChild(el("p", { class: "modal-desc" }, "Scanne le QR avec Google Authenticator (ou entre la clé manuellement), puis saisis le code à 6 chiffres."));
                    const qrWrap = el("div", { class: "modal-qr" });
                    qrWrap.innerHTML = qr;
                    modal.appendChild(qrWrap);
                    modal.appendChild(el("div", { class: "modal-secret" }, secret));
                    const input = el("input", { class: "modal-input", type: "text", inputmode: "numeric", maxlength: "6", placeholder: "123456" });
                    modal.appendChild(input);
                    const msg = el("div", { style: "display:none" });
                    modal.appendChild(msg);
                    const actions = el("div", { class: "modal-actions" });
                    const cancel = el("button", { class: "modal-btn cancel", type: "button" }, "Annuler");
                    cancel.addEventListener("click", async () => {
                        await sb.auth.mfa.unenroll({ factorId });
                        close();
                    });
                    const submit = el("button", { class: "modal-btn primary", type: "button" }, "Activer");
                    submit.addEventListener("click", async () => {
                        const code = input.value.trim();
                        if (!/^\d{6}$/.test(code)) { msg.className = "modal-err"; msg.style.display = ""; msg.textContent = "Code à 6 chiffres requis."; return; }
                        submit.disabled = true; submit.textContent = "Validation…";
                        const { error } = await sb.auth.mfa.verify({ factorId, challengeId, code });
                        if (error) {
                            msg.className = "modal-err"; msg.style.display = ""; msg.textContent = error.message;
                            submit.disabled = false; submit.textContent = "Activer";
                            return;
                        }
                        msg.className = "modal-ok"; msg.style.display = ""; msg.textContent = "Authentificateur activé.";
                        setTimeout(close, 1100);
                    });
                    actions.appendChild(cancel); actions.appendChild(submit);
                    modal.appendChild(actions);
                });
            }

            /* --- DELETE ACCOUNT --- */
            function modalDeleteAccount() {
                openModal((modal, close) => {
                    modal.appendChild(el("h3", { class: "modal-title" }, "Supprimer mon compte"));
                    const desc = el("p", { class: "modal-desc danger" }, "Action irréversible. Tu ne pourras pas récupérer un compte supprimé.");
                    modal.appendChild(desc);
                    modal.appendChild(el("p", { class: "modal-desc" }, "Entre ton mot de passe pour confirmer."));
                    const pw = el("input", { class: "modal-input", type: "password", placeholder: "Mot de passe", autocomplete: "current-password" });
                    modal.appendChild(pw);
                    const msg = el("div", { style: "display:none" });
                    modal.appendChild(msg);
                    const actions = el("div", { class: "modal-actions" });
                    const cancel = el("button", { class: "modal-btn cancel", type: "button" }, "Annuler");
                    cancel.addEventListener("click", close);
                    const submit = el("button", { class: "modal-btn danger", type: "button" }, "Supprimer");
                    submit.addEventListener("click", async () => {
                        msg.style.display = "none";
                        submit.disabled = true; submit.textContent = "Vérification…";
                        // verify password
                        const { error: siErr } = await sb.auth.signInWithPassword({ email: CURRENT_USER.email, password: pw.value });
                        if (siErr) {
                            msg.className = "modal-err"; msg.style.display = ""; msg.textContent = "Mot de passe incorrect.";
                            submit.disabled = false; submit.textContent = "Supprimer";
                            return;
                        }
                        submit.textContent = "Suppression…";
                        const { error: fnErr } = await sb.functions.invoke("delete-account", { body: {} });
                        if (fnErr) {
                            msg.className = "modal-err"; msg.style.display = ""; msg.textContent = "Erreur : " + fnErr.message + ". Edge function 'delete-account' non déployée ?";
                            submit.disabled = false; submit.textContent = "Supprimer";
                            return;
                        }
                        await sb.auth.signOut();
                        close();
                        closeSettings();
                        // reset client state
                        CURRENT_USER = { id: null, email: null, name: "", age: null, city: "", tagline: "", passions: [], initials: "?", phone: "", isPro: false, stats: { matches: 0, conversations: 0, bestScore: 0 } };
                        state.neuron = { messages: [], inConversation: false, exchanges: 0, onboardingDone: false };
                        state.isNewUser = true;
                        showAuth();
                    });
                    actions.appendChild(cancel); actions.appendChild(submit);
                    modal.appendChild(actions);
                });
            }

            /* =================================================================
   9d. CONFETTI
================================================================= */
            function launchConfetti() {
                const canvas = document.getElementById("confetti-canvas");
                canvas.style.display = "";
                const ctx = canvas.getContext("2d");
                const parent = canvas.parentElement;
                const rect = parent.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                const colors = ["#ffd27a", "#ff8ab8", "#7c5ef7", "#4f6ef7", "#8be0ff", "#4fc87a"];
                const N = 120;
                const parts = Array.from({ length: N }, () => ({
                    x: canvas.width / 2 + (Math.random() - 0.5) * 40,
                    y: canvas.height / 3,
                    vx: (Math.random() - 0.5) * 10,
                    vy: Math.random() * -12 - 4,
                    g: 0.35,
                    size: 5 + Math.random() * 6,
                    rot: Math.random() * Math.PI * 2,
                    vr: (Math.random() - 0.5) * 0.3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 0,
                }));
                const start = performance.now();
                function frame(now) {
                    const t = now - start;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    parts.forEach((p) => {
                        p.vy += p.g;
                        p.x += p.vx;
                        p.y += p.vy;
                        p.rot += p.vr;
                        p.life = t;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = Math.max(0, 1 - t / 2800);
                        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.5);
                        ctx.restore();
                    });
                    if (t < 2800) requestAnimationFrame(frame);
                    else { ctx.clearRect(0, 0, canvas.width, canvas.height); canvas.style.display = "none"; }
                }
                requestAnimationFrame(frame);
            }

            /* =================================================================
   9e. MESSAGING SYSTEM (Supabase-backed)
================================================================= */
            function formatChatTime(d) {
                const now = new Date();
                const sameDay = d.toDateString() === now.toDateString();
                if (sameDay) return d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
                const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
                if (d.toDateString() === yesterday.toDateString()) return "Hier";
                return d.getDate().toString().padStart(2, "0") + "/" + (d.getMonth() + 1).toString().padStart(2, "0");
            }
            function gradForId(id) {
                const gradients = [
                    "linear-gradient(135deg,#ff6b9d,#7c5ef7)",
                    "linear-gradient(135deg,#1e3a8a,#38bdf8)",
                    "linear-gradient(135deg,#be185d,#f472b6)",
                    "linear-gradient(135deg,#065f46,#10b981)",
                    "linear-gradient(135deg,#78350f,#7c5ef7)",
                    "linear-gradient(135deg,#fb7185,#f59e0b)",
                ];
                let h = 0; for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0;
                return gradients[Math.abs(h) % gradients.length];
            }

            async function loadConversations() {
                if (!CURRENT_USER.id) return;
                // Clear in-memory
                for (const k in CONVERSATIONS) delete CONVERSATIONS[k];
                // Fetch all messages involving me
                const { data: msgs, error } = await sb
                    .from("messages")
                    .select("id, sender_id, recipient_id, content, created_at, read_at")
                    .or(`sender_id.eq.${CURRENT_USER.id},recipient_id.eq.${CURRENT_USER.id}`)
                    .order("created_at", { ascending: true });
                if (error) { console.error("[loadConversations]", error); return; }
                // Group by other user id
                const partnerIds = new Set();
                (msgs || []).forEach((m) => {
                    const otherId = m.sender_id === CURRENT_USER.id ? m.recipient_id : m.sender_id;
                    partnerIds.add(otherId);
                    if (!CONVERSATIONS[otherId]) {
                        CONVERSATIONS[otherId] = {
                            name: "?", avatar_url: null, grad: gradForId(otherId), unread: 0, time: "", lastTs: 0, messages: [],
                        };
                    }
                    const conv = CONVERSATIONS[otherId];
                    const from = m.sender_id === CURRENT_USER.id ? "me" : "them";
                    conv.messages.push({ id: m.id, from, text: m.content });
                    const ts = new Date(m.created_at).getTime();
                    if (ts > conv.lastTs) { conv.lastTs = ts; conv.time = formatChatTime(new Date(m.created_at)); }
                    if (from === "them" && !m.read_at) conv.unread += 1;
                });
                // Fetch partner profiles
                if (partnerIds.size > 0) {
                    const ids = Array.from(partnerIds);
                    const { data: profiles } = await sb
                        .from("profiles")
                        .select("id, name, avatar_url")
                        .in("id", ids);
                    (profiles || []).forEach((p) => {
                        if (CONVERSATIONS[p.id]) {
                            CONVERSATIONS[p.id].name = p.name || "Utilisateur";
                            CONVERSATIONS[p.id].avatar_url = p.avatar_url || null;
                        }
                    });
                }
                computeUnread();
                if (state.activeTab === "messages") renderMessages();
                // stats
                CURRENT_USER.stats.conversations = Object.keys(CONVERSATIONS).length;
            }

            async function subscribeRealtime() {
                if (!CURRENT_USER.id) return;
                if (realtimeChannel) { await sb.removeChannel(realtimeChannel); realtimeChannel = null; }
                realtimeChannel = sb
                    .channel("messages-" + CURRENT_USER.id)
                    .on("postgres_changes",
                        { event: "INSERT", schema: "public", table: "messages", filter: `recipient_id=eq.${CURRENT_USER.id}` },
                        async (payload) => { await handleIncomingMessage(payload.new); })
                    .subscribe();
            }

            async function handleIncomingMessage(row) {
                const otherId = row.sender_id;
                if (!CONVERSATIONS[otherId]) {
                    CONVERSATIONS[otherId] = { name: "…", avatar_url: null, grad: gradForId(otherId), unread: 0, time: "", lastTs: 0, messages: [] };
                    // fetch partner profile
                    const { data: p } = await sb.from("profiles").select("id, name, avatar_url").eq("id", otherId).maybeSingle();
                    if (p) { CONVERSATIONS[otherId].name = p.name || "Utilisateur"; CONVERSATIONS[otherId].avatar_url = p.avatar_url || null; }
                }
                const conv = CONVERSATIONS[otherId];
                // avoid duplicates (in case optimistic)
                if (conv.messages.some((m) => m.id === row.id)) return;
                conv.messages.push({ id: row.id, from: "them", text: row.content });
                const ts = new Date(row.created_at).getTime();
                conv.lastTs = ts;
                conv.time = formatChatTime(new Date(row.created_at));
                // if chat is open on this partner, auto-mark read
                if (state.activeChatId === otherId) {
                    await sb.from("messages").update({ read_at: new Date().toISOString() }).eq("id", row.id);
                    renderChatBubbles();
                } else {
                    conv.unread += 1;
                }
                computeUnread();
                if (state.activeTab === "messages") renderMessages();
            }

            /* =================================================================
   9f. AVATAR UPLOAD (Supabase Storage, unlocked at ≥50% profile)
================================================================= */
            async function handleAvatarUpload(file) {
                if (!file || !CURRENT_USER.id) return;
                if (!/^image\//.test(file.type)) { alert("Seules les images sont acceptées."); return; }
                if (file.size > 4 * 1024 * 1024) { alert("Fichier trop lourd (max 4 Mo)."); return; }
                const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
                const path = `${CURRENT_USER.id}/avatar.${ext}`;
                const { error: upErr } = await sb.storage.from("avatars").upload(path, file, { upsert: true, cacheControl: "3600" });
                if (upErr) { alert("Upload échoué : " + upErr.message); return; }
                const { data: urlData } = sb.storage.from("avatars").getPublicUrl(path);
                const url = urlData.publicUrl + "?v=" + Date.now(); // bust cache
                CURRENT_USER.avatar_url = url;
                await sb.from("profiles").update({ avatar_url: url, updated_at: new Date().toISOString() }).eq("id", CURRENT_USER.id);
                renderProfile();
            }
            function openAvatarPicker() {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "image/*";
                input.addEventListener("change", (e) => {
                    const f = e.target.files && e.target.files[0];
                    if (f) handleAvatarUpload(f);
                });
                input.click();
            }

            /* =================================================================
   10. INIT
================================================================= */
            async function init() {
                initAuthUI();
                initTabs();
                initNeuronInput();
                initMatchSearch();
                initChatInput();
                document.getElementById("btn-settings").addEventListener("click", openSettings);
                document.getElementById("settings-back").addEventListener("click", settingsBack);
                try {
                    if (!sb || !SUPABASE_URL || SUPABASE_URL.startsWith("YOUR_")) {
                        throw new Error("Supabase non configuré (URL/ANON_KEY manquants).");
                    }
                    // Session check
                    const { data, error } = await sb.auth.getSession();
                    if (error) throw error;
                    if (data && data.session) {
                        await bootstrapSession(data.session);
                    } else {
                        showAuth();
                    }
                } catch (err) {
                    console.error("[init fatal]", err);
                    showAuth();
                    setAuthMessage("error", "Erreur init : " + (err.message || err));
                }
                // React to OAuth redirect / sign-out from other tabs
                sb.auth.onAuthStateChange(async (event, session) => {
                    if (event === "SIGNED_IN" && session && CURRENT_USER.id !== session.user.id) {
                        await bootstrapSession(session);
                    } else if (event === "SIGNED_OUT") {
                        CURRENT_USER.id = null;
                        showAuth();
                    }
                });
            }
            if (window.__gateReady && typeof window.__gateReady.then === "function") {
                window.__gateReady.then(init);
            } else {
                init();
            }
        </script>
