            /* =================================================================
   VOICE — STT (Web Speech API) + TTS (OpenAI via worker) + voicechat mode
================================================================= */
            const TTS_URL = WORKER_URL.replace(/\/$/, "") + "/tts";

            const VOICE = {
                sttSupported: false,
                rec: null,
                listening: false,
                speakerOn: true, // Amber voice on/off (mute toggle)
                micMuted: false, // user mic privacy toggle (in voicechat)
                currentAudio: null,
                ttsVoice: "sage",
                // Voicechat mode state
                chatMode: false,
                audioCtx: null,
                analyser: null,
                connectedSources: new WeakSet(),
                rafId: null,
                pendingFinal: "",
                shouldRestart: false,
            };

            function setVCStatus(msg) {
                const el = document.getElementById("vc-status");
                if (el) el.textContent = msg;
            }

            function ensureAudioCtx() {
                if (!VOICE.audioCtx) {
                    const Ctx =
                        window.AudioContext || window.webkitAudioContext;
                    if (!Ctx) return null;
                    VOICE.audioCtx = new Ctx();
                }
                if (VOICE.audioCtx.state === "suspended") {
                    VOICE.audioCtx.resume();
                }
                if (!VOICE.analyser) {
                    VOICE.analyser = VOICE.audioCtx.createAnalyser();
                    VOICE.analyser.fftSize = 128;
                    VOICE.analyser.smoothingTimeConstant = 0.7;
                }
                return VOICE.audioCtx;
            }

            function attachVisualizer(audio) {
                if (!ensureAudioCtx()) return;
                try {
                    if (!VOICE.connectedSources.has(audio)) {
                        const src =
                            VOICE.audioCtx.createMediaElementSource(audio);
                        src.connect(VOICE.analyser);
                        VOICE.analyser.connect(VOICE.audioCtx.destination);
                        VOICE.connectedSources.add(audio);
                    }
                } catch (e) {
                    console.warn("[viz attach]", e);
                    return;
                }
                runVisualizerLoop();
            }

            function runVisualizerLoop() {
                if (!VOICE.analyser) return;
                const data = new Uint8Array(VOICE.analyser.frequencyBinCount);
                const orbCore = document.getElementById("vc-orb-core");
                const orbGlow = document.getElementById("vc-orb-glow");
                const orbAura = document.getElementById("vc-orb-aura");
                // Smoothed energy values (cheap one-pole low-pass)
                let smoothBass = 0;
                let smoothMid = 0;
                let smoothAvg = 0;
                function tick() {
                    VOICE.analyser.getByteFrequencyData(data);
                    const n = data.length;
                    // Split into bass (low 25%), mid (next 35%), full average
                    const bassEnd = Math.floor(n * 0.25);
                    const midEnd = Math.floor(n * 0.6);
                    let bassSum = 0,
                        midSum = 0,
                        sum = 0;
                    for (let i = 0; i < n; i++) {
                        sum += data[i];
                        if (i < bassEnd) bassSum += data[i];
                        else if (i < midEnd) midSum += data[i];
                    }
                    const bass = bassSum / bassEnd / 255 || 0;
                    const mid = midSum / (midEnd - bassEnd) / 255 || 0;
                    const avg = sum / n / 255 || 0;
                    // Smooth (more responsive on rise, slower decay feel)
                    smoothBass = smoothBass * 0.55 + bass * 0.45;
                    smoothMid = smoothMid * 0.55 + mid * 0.45;
                    smoothAvg = smoothAvg * 0.55 + avg * 0.45;
                    if (orbCore) {
                        const s = 1 + smoothAvg * 0.42;
                        orbCore.style.transform = `scale(${s.toFixed(3)})`;
                    }
                    if (orbGlow) {
                        const s = 1 + smoothMid * 0.55;
                        orbGlow.style.transform = `scale(${s.toFixed(3)})`;
                    }
                    if (orbAura) {
                        const s = 1 + smoothBass * 0.7;
                        orbAura.style.opacity = (
                            0.7 +
                            smoothBass * 0.3
                        ).toFixed(3);
                        orbAura.style.transform = `scale(${s.toFixed(3)})`;
                    }
                    VOICE.rafId = requestAnimationFrame(tick);
                }
                tick();
            }

            function stopVisualizer() {
                if (VOICE.rafId) {
                    cancelAnimationFrame(VOICE.rafId);
                    VOICE.rafId = null;
                }
                ["vc-orb-core", "vc-orb-glow", "vc-orb-aura"].forEach((id) => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.style.transform = "scale(1)";
                        el.style.opacity = "";
                    }
                });
            }

            // -- listening helpers ----------------------------------------
            function startListening() {
                if (!VOICE.sttSupported || VOICE.listening) return;
                try {
                    VOICE.pendingFinal = "";
                    VOICE.rec.start();
                } catch (e) {
                    /* already running — race-safe */
                }
            }

            function stopListening() {
                if (!VOICE.sttSupported) return;
                try {
                    VOICE.rec.stop();
                } catch (e) {
                    /* not running */
                }
            }

            // Centralized gate: only listen when ALL conditions allow it.
            // Called from every "would now be a good time to listen?" site.
            function maybeStartListening(delayMs) {
                if (!VOICE.chatMode) return; // voicechat closed
                if (VOICE.micMuted) return; // user muted mic
                if (VOICE.currentAudio) return; // Amber speaking (echo guard)
                if (VOICE.listening) return; // already on
                if (delayMs && delayMs > 0) {
                    setTimeout(() => maybeStartListening(0), delayMs);
                } else {
                    startListening();
                }
            }

            function enterVoiceChat() {
                if (!VOICE.sttSupported) {
                    dbgLog("error", "STT not supported");
                    alert(
                        "Ton navigateur ne supporte pas la reconnaissance vocale. Essaie Chrome, Edge ou Safari.",
                    );
                    return;
                }
                dbgLog("system", "▶ enterVoiceChat");
                VOICE.chatMode = true;
                VOICE.micMuted = false; // reset privacy toggle on each entry
                VOICE.speakerOn = true; // ensure TTS is on
                const overlay = document.getElementById("vc-overlay");
                if (overlay) overlay.classList.add("is-open");
                const micBtn = document.getElementById("vc-mic");
                if (micBtn) micBtn.classList.remove("is-muted");
                const micLbl = document.getElementById("vc-mic-label");
                if (micLbl) micLbl.textContent = "Micro";
                setVCStatus("Je t'écoute…");
                ensureAudioCtx(); // prime audio context with the user gesture
                maybeStartListening(300);
            }

            function leaveVoiceChat() {
                dbgLog("system", "■ leaveVoiceChat");
                VOICE.chatMode = false;
                const overlay = document.getElementById("vc-overlay");
                if (overlay) overlay.classList.remove("is-open");
                stopListening();
                if (VOICE.currentAudio) {
                    try {
                        VOICE.currentAudio.pause();
                    } catch (_) {}
                    VOICE.currentAudio = null;
                }
                stopVisualizer();
            }

            // Mic mute (user privacy toggle — pauses listening loop)
            function toggleMicMute() {
                VOICE.micMuted = !VOICE.micMuted;
                const btn = document.getElementById("vc-mic");
                const lbl = document.getElementById("vc-mic-label");
                if (btn) {
                    btn.classList.toggle("is-muted", VOICE.micMuted);
                    if (VOICE.micMuted) btn.classList.remove("is-listening");
                }
                if (lbl) lbl.textContent = VOICE.micMuted ? "Coupé" : "Micro";
                if (VOICE.micMuted) {
                    stopListening();
                    if (VOICE.chatMode) setVCStatus("Micro coupé");
                } else {
                    if (VOICE.chatMode && !VOICE.currentAudio) {
                        setVCStatus("Je t'écoute…");
                    }
                    maybeStartListening(100);
                }
            }

            function initVoice() {
                const SR =
                    window.SpeechRecognition || window.webkitSpeechRecognition;
                VOICE.sttSupported = !!SR;
                const micBtn = document.getElementById("neuron-mic");

                // --- Top-bar mic button → opens voicechat ---
                if (micBtn) {
                    if (!VOICE.sttSupported) {
                        micBtn.classList.add("is-disabled");
                        micBtn.title =
                            "Reconnaissance vocale non supportée par ce navigateur";
                    } else {
                        micBtn.addEventListener("click", () =>
                            enterVoiceChat(),
                        );
                    }
                }

                // --- Voicechat overlay buttons ---
                const vcMic = document.getElementById("vc-mic");
                const vcLeave = document.getElementById("vc-leave");
                if (vcMic) vcMic.addEventListener("click", toggleMicMute);
                if (vcLeave) vcLeave.addEventListener("click", leaveVoiceChat);

                // ESC to leave
                document.addEventListener("keydown", (e) => {
                    if (e.key === "Escape" && VOICE.chatMode) {
                        leaveVoiceChat();
                    }
                });

                if (!VOICE.sttSupported) return;

                VOICE.rec = new SR();
                VOICE.rec.lang = "fr-FR";
                VOICE.rec.interimResults = true;
                VOICE.rec.continuous = false;
                VOICE.rec.maxAlternatives = 1;

                VOICE.rec.onstart = () => {
                    VOICE.listening = true;
                    if (vcMic && !VOICE.micMuted)
                        vcMic.classList.add("is-listening");
                    if (VOICE.chatMode && !VOICE.currentAudio) {
                        setVCStatus("Je t'écoute…");
                    }
                    dbgLog("stt", "▶ start (lang=" + VOICE.rec.lang + ")");
                };
                VOICE.rec.onresult = (e) => {
                    let interim = "";
                    let gotFinal = false;
                    for (let i = e.resultIndex; i < e.results.length; i++) {
                        const t = e.results[i][0].transcript;
                        if (e.results[i].isFinal) {
                            VOICE.pendingFinal += t;
                            gotFinal = true;
                            dbgLog("stt", "✓ final", t.slice(0, 120));
                        } else {
                            interim += t;
                        }
                    }
                    if (!gotFinal && interim) {
                        // Throttle interim logs — only log the latest snapshot
                        DBG.lastInterim = interim;
                        if (DBG.interimTimer) clearTimeout(DBG.interimTimer);
                        DBG.interimTimer = setTimeout(() => {
                            dbgLog(
                                "stt",
                                "… interim",
                                DBG.lastInterim.slice(0, 120),
                            );
                        }, 280);
                    }
                };
                VOICE.rec.onerror = (e) => {
                    console.warn("[stt error]", e.error);
                    VOICE.listening = false;
                    if (vcMic) vcMic.classList.remove("is-listening");
                    dbgLog("error", "✗ stt error: " + e.error);
                    if (
                        e.error === "no-speech" ||
                        e.error === "aborted" ||
                        e.error === "network"
                    ) {
                        // Transient: loop back into listening
                        maybeStartListening(400);
                    }
                };
                VOICE.rec.onend = () => {
                    VOICE.listening = false;
                    if (vcMic) vcMic.classList.remove("is-listening");
                    const text = VOICE.pendingFinal.trim();
                    VOICE.pendingFinal = "";
                    dbgLog("stt", text ? "■ end → submit" : "■ end (no text)", {
                        len: text.length,
                    });
                    if (text) {
                        if (VOICE.chatMode) {
                            setVCStatus("Amber réfléchit…");
                            // Don't restart listening here; the TTS pipeline
                            // (or speakAmber early-exit) will resume the loop.
                        }
                        submitNeuronMessage(text);
                    } else {
                        // No speech captured this session — keep listening
                        maybeStartListening(150);
                    }
                };
            }

            async function speakAmber(text) {
                // Hard gate: TTS is voicechat-mode only.
                if (!VOICE.chatMode) {
                    dbgLog("tts", "skip (not in chatMode)");
                    return;
                }

                // In chat mode but speaker muted → skip TTS, resume mic loop.
                if (!VOICE.speakerOn || !text || !text.trim()) {
                    setVCStatus("Je t'écoute…");
                    maybeStartListening(200);
                    return;
                }

                // Strip emoji + markdown for cleaner TTS
                const clean = text
                    .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, "")
                    .replace(/[*_`~]/g, "")
                    .trim();
                if (!clean) {
                    setVCStatus("Je t'écoute…");
                    maybeStartListening(200);
                    return;
                }

                const t0 = performance.now();
                dbgLog("tts", `→ POST ${TTS_URL}`, {
                    len: clean.length,
                    voice: VOICE.ttsVoice,
                });
                try {
                    const r = await fetch(TTS_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            text: clean,
                            voice: VOICE.ttsVoice,
                        }),
                    });
                    const dt = Math.round(performance.now() - t0);
                    if (!r.ok) {
                        const errBody = await r.text().catch(() => "");
                        console.warn("[tts] http " + r.status, errBody);
                        dbgLog(
                            "error",
                            `tts HTTP ${r.status} (${dt}ms)`,
                            errBody.slice(0, 200),
                        );
                        setVCStatus("Je t'écoute…");
                        maybeStartListening(300);
                        return;
                    }
                    const blob = await r.blob();
                    dbgLog("tts", `← mp3 ${blob.size}B (${dt}ms)`);
                    const url = URL.createObjectURL(blob);

                    if (VOICE.currentAudio) {
                        try {
                            VOICE.currentAudio.pause();
                        } catch (_) {}
                        VOICE.currentAudio = null;
                    }
                    const audio = new Audio(url);
                    VOICE.currentAudio = audio;

                    // Pause mic during Amber's speech (echo prevention).
                    stopListening();

                    audio.onended = () => {
                        URL.revokeObjectURL(url);
                        if (VOICE.currentAudio === audio)
                            VOICE.currentAudio = null;
                        stopVisualizer();
                        if (VOICE.chatMode) {
                            setVCStatus("Je t'écoute…");
                            maybeStartListening(150);
                        }
                    };
                    audio.onerror = () => {
                        URL.revokeObjectURL(url);
                        if (VOICE.currentAudio === audio)
                            VOICE.currentAudio = null;
                        stopVisualizer();
                        if (VOICE.chatMode) {
                            setVCStatus("Je t'écoute…");
                            maybeStartListening(250);
                        }
                    };

                    setVCStatus("Amber parle…");
                    attachVisualizer(audio);
                    await audio.play();
                } catch (e) {
                    console.warn("[tts] failed", e);
                    dbgLog("error", "tts threw", e.message);
                    setVCStatus("Je t'écoute…");
                    maybeStartListening(300);
                }
            }

            async function handleAuthSubmit(e) {
                e.preventDefault();
                setAuthMessage(null, "");
                const btn = document.getElementById("auth-submit");
                const email = document
                    .getElementById("auth-email")
                    .value.trim();
                const password = document.getElementById("auth-password").value;
                btn.disabled = true;
                btn.textContent = "Patiente…";
                try {
                    if (authMode === "register") {
                        const confirm =
                            document.getElementById("auth-confirm").value;
                        if (password !== confirm)
                            throw new Error(
                                "Les mots de passe ne correspondent pas.",
                            );
                        if (password.length < 6)
                            throw new Error("6 caractères minimum.");
                        const { data, error } = await sb.auth.signUp({
                            email,
                            password,
                            options: {
                                emailRedirectTo:
                                    window.location.origin +
                                    window.location.pathname,
                            },
                        });
                        if (error) throw error;
                        if (data.user && !data.session) {
                            setAuthMessage(
                                "success",
                                "Email envoyé ! Clique sur le lien pour confirmer ton compte, puis reviens te connecter.",
                            );
                            btn.disabled = false;
                            btn.textContent = "Créer mon compte";
                            return;
                        }
                        // auto-signed-in (if email confirm disabled in Supabase)
                        await bootstrapSession(data.session);
                    } else {
                        const { data, error } =
                            await sb.auth.signInWithPassword({
                                email,
                                password,
                            });
                        if (error) throw error;
                        await bootstrapSession(data.session);
                    }
                } catch (err) {
                    const msg = (err && err.message) || String(err);
                    setAuthMessage("error", translateAuthError(msg));
                    btn.disabled = false;
                    btn.textContent =
                        authMode === "login"
                            ? "Se connecter"
                            : "Créer mon compte";
                }
            }
            function translateAuthError(msg) {
                if (/invalid login/i.test(msg))
                    return "Email ou mot de passe incorrect.";
                if (/user already registered/i.test(msg))
                    return "Cet email est déjà utilisé.";
                if (/email not confirmed/i.test(msg))
                    return "Email non confirmé. Vérifie ta boîte mail.";
                if (/rate limit/i.test(msg))
                    return "Trop de tentatives. Réessaie plus tard.";
                return msg;
            }

            async function bootstrapSession(session) {
                if (!session || !session.user) {
                    showAuth();
                    return;
                }
                try {
                    CURRENT_USER.id = session.user.id;
                    CURRENT_USER.email = session.user.email || "";
                    // Load or create profile row
                    const { data: profile, error: pErr } = await sb
                        .from("profiles")
                        .select("*")
                        .eq("id", CURRENT_USER.id)
                        .maybeSingle();
                    if (pErr) console.error("[profiles select]", pErr);
                    if (profile) {
                        CURRENT_USER.name = profile.name || "";
                        CURRENT_USER.age = profile.age || null;
                        CURRENT_USER.city = profile.city || "";
                        CURRENT_USER.tagline = profile.tagline || "";
                        CURRENT_USER.passions = Array.isArray(profile.passions)
                            ? profile.passions
                            : [];
                        CURRENT_USER.isPro = !!profile.is_pro;
                        CURRENT_USER.phone =
                            session.user.phone || profile.phone || "";
                        CURRENT_USER.avatar_url = profile.avatar_url || "";
                    } else {
                        const { error: insErr } = await sb
                            .from("profiles")
                            .insert({
                                id: CURRENT_USER.id,
                                email: CURRENT_USER.email,
                            });
                        if (insErr) console.error("[profiles insert]", insErr);
                    }
                    // Load conversation
                    const { data: conv, error: cErr } = await sb
                        .from("conversations")
                        .select("messages, exchanges")
                        .eq("user_id", CURRENT_USER.id)
                        .maybeSingle();
                    if (cErr) console.error("[conversations select]", cErr);
                    if (
                        conv &&
                        Array.isArray(conv.messages) &&
                        conv.messages.length > 0
                    ) {
                        state.isNewUser = false;
                        state.neuron.messages = conv.messages;
                        state.neuron.exchanges = conv.exchanges || 0;
                        state.neuron.inConversation = true;
                        state.neuron.onboardingDone = true;
                        unlockTabs();
                    } else {
                        state.isNewUser = true;
                        // First-time user: Amber sends M1 automatically
                        state.neuron.messages = [
                            { from: "neuron", text: M1_MESSAGE },
                        ];
                        state.neuron.inConversation = true;
                        await saveConversation();
                    }
                    hideAuth();
                    // Initialize completion baseline so returning 100%-users don't re-trigger animation
                    state._lastCompletion = computeProfileCompletion();
                    state._celebrated100 = state._lastCompletion >= 100;
                    renderNeuron();
                    renderProfile();
                    computeUnread();
                    // Load real messaging data + subscribe
                    await loadConversations();
                    await subscribeRealtime();
                } catch (err) {
                    console.error("[bootstrapSession fatal]", err);
                    setAuthMessage(
                        "error",
                        "Erreur chargement : " +
                            (err.message || err) +
                            " — vérifie la console.",
                    );
                    showAuth();
                }
            }

            async function extractProfileFromChat() {
                if (!CURRENT_USER.id) return;
                const transcript = state.neuron.messages
                    .map(
                        (m) =>
                            `${m.from === "user" ? "User" : "Amber"}: ${Array.isArray(m.text) ? m.text.join(" ") : m.text}`,
                    )
                    .join("\n");
                const prompt = `À partir de cette conversation entre Amber et un user, extrais le profil de l'user en JSON strict (pas de markdown, pas de backticks). Schéma exact : {"name":"string ou vide","city":"string ou vide","tagline":"phrase courte qui résume l'user d'après ses obsessions, ou vide","passions":["string avec emoji si pertinent", ...]}. Règles : ne pas inventer ce qui n'est pas dans la conversation. Laisser vide si non dit. Passions = références précises mentionnées (artistes, œuvres, sujets, projets), max 8. Tagline = phrase de bio en 1 ligne max 60 caractères, inspirée par les obsessions réelles de l'user, ou vide si trop tôt.\n\nConversation:\n${transcript}`;
                const raw = await callGPT(
                    [{ role: "user", content: prompt }],
                    "Tu es un extracteur de profil. Tu réponds UNIQUEMENT en JSON valide.",
                );
                let parsed;
                try {
                    parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());
                } catch {
                    return;
                }
                let changed = false;
                if (
                    parsed.name &&
                    typeof parsed.name === "string" &&
                    parsed.name !== CURRENT_USER.name
                ) {
                    CURRENT_USER.name = parsed.name;
                    changed = true;
                }
                if (
                    parsed.city &&
                    typeof parsed.city === "string" &&
                    parsed.city !== CURRENT_USER.city
                ) {
                    CURRENT_USER.city = parsed.city;
                    changed = true;
                }
                if (
                    parsed.tagline &&
                    typeof parsed.tagline === "string" &&
                    parsed.tagline !== CURRENT_USER.tagline
                ) {
                    CURRENT_USER.tagline = parsed.tagline;
                    changed = true;
                }
                if (Array.isArray(parsed.passions)) {
                    const clean = parsed.passions
                        .filter((p) => typeof p === "string" && p.trim())
                        .slice(0, 8);
                    if (
                        JSON.stringify(clean) !==
                        JSON.stringify(CURRENT_USER.passions)
                    ) {
                        CURRENT_USER.passions = clean;
                        changed = true;
                    }
                }
                if (changed) {
                    await sb.from("profiles").upsert(
                        {
                            id: CURRENT_USER.id,
                            email: CURRENT_USER.email,
                            name: CURRENT_USER.name || null,
                            city: CURRENT_USER.city || null,
                            tagline: CURRENT_USER.tagline || null,
                            passions: CURRENT_USER.passions,
                            updated_at: new Date().toISOString(),
                        },
                        { onConflict: "id" },
                    );
                    // Detect 100% transition
                    const newCompletion = computeProfileCompletion();
                    if (
                        newCompletion >= 100 &&
                        state._lastCompletion < 100 &&
                        !state._celebrated100
                    ) {
                        state._celebrated100 = true;
                        triggerCompletion100();
                    }
                    state._lastCompletion = newCompletion;
                    if (state.activeTab === "profile") renderProfile();
                }
            }

            function openModal(contentBuilder) {
                const root = document.getElementById("modal-root");
                root.innerHTML = "";
                const backdrop = el("div", { class: "modal-backdrop" });
                backdrop.addEventListener("click", (e) => {
                    if (e.target === backdrop) closeModal();
                });
                const modal = el("div", { class: "modal" });
                contentBuilder(modal, closeModal);
                backdrop.appendChild(modal);
                root.appendChild(backdrop);
            }
            function closeModal() {
                document.getElementById("modal-root").innerHTML = "";
            }

            /* --- PHONE SETUP --- */
            function modalPhoneSetup() {
                let step = CURRENT_USER.phone ? "remove" : "enter";
                let pendingPhone = "";
                openModal((modal, close) => {
                    const render = () => {
                        modal.innerHTML = "";
                        if (step === "remove") {
                            modal.appendChild(
                                el(
                                    "h3",
                                    { class: "modal-title" },
                                    "Numéro de téléphone",
                                ),
                            );
                            modal.appendChild(
                                el(
                                    "p",
                                    { class: "modal-desc" },
                                    "Ton numéro actuel : " + CURRENT_USER.phone,
                                ),
                            );
                            const actions = el("div", {
                                class: "modal-actions",
                            });
                            const cancel = el(
                                "button",
                                { class: "modal-btn cancel", type: "button" },
                                "Fermer",
                            );
                            cancel.addEventListener("click", close);
                            const change = el(
                                "button",
                                { class: "modal-btn primary", type: "button" },
                                "Changer",
                            );
                            change.addEventListener("click", () => {
                                step = "enter";
                                render();
                            });
                            actions.appendChild(cancel);
                            actions.appendChild(change);
                            modal.appendChild(actions);
                        } else if (step === "enter") {
                            modal.appendChild(
                                el(
                                    "h3",
                                    { class: "modal-title" },
                                    "Ajouter un numéro",
                                ),
                            );
                            modal.appendChild(
                                el(
                                    "p",
                                    { class: "modal-desc" },
                                    "Format international, ex : +33612345678",
                                ),
                            );
                            const input = el("input", {
                                class: "modal-input",
                                type: "tel",
                                placeholder: "+33...",
                                value: pendingPhone,
                            });
                            modal.appendChild(input);
                            const err = el("div", { style: "display:none" });
                            modal.appendChild(err);
                            const actions = el("div", {
                                class: "modal-actions",
                            });
                            const cancel = el(
                                "button",
                                { class: "modal-btn cancel", type: "button" },
                                "Annuler",
                            );
                            cancel.addEventListener("click", close);
                            const submit = el(
                                "button",
                                { class: "modal-btn primary", type: "button" },
                                "Envoyer le code",
                            );
                            submit.addEventListener("click", async () => {
                                const phone = input.value.trim();
                                if (!/^\+\d{6,15}$/.test(phone)) {
                                    err.className = "modal-err";
                                    err.style.display = "";
                                    err.textContent = "Numéro invalide.";
                                    return;
                                }
                                submit.disabled = true;
                                submit.textContent = "Envoi…";
                                const { error } = await sb.auth.updateUser({
                                    phone,
                                });
                                if (error) {
                                    err.className = "modal-err";
                                    err.style.display = "";
                                    err.textContent = error.message;
                                    submit.disabled = false;
                                    submit.textContent = "Envoyer le code";
                                    return;
                                }
                                pendingPhone = phone;
                                step = "verify";
                                render();
                            });
                            actions.appendChild(cancel);
                            actions.appendChild(submit);
                            modal.appendChild(actions);
                        } else if (step === "verify") {
                            modal.appendChild(
                                el(
                                    "h3",
                                    { class: "modal-title" },
                                    "Vérification",
                                ),
                            );
                            modal.appendChild(
                                el(
                                    "p",
                                    { class: "modal-desc" },
                                    "Entre le code à 6 chiffres reçu au " +
                                        pendingPhone,
                                ),
                            );
                            const input = el("input", {
                                class: "modal-input",
                                type: "text",
                                inputmode: "numeric",
                                maxlength: "6",
                                placeholder: "123456",
                            });
                            modal.appendChild(input);
                            const err = el("div", { style: "display:none" });
                            modal.appendChild(err);
                            const actions = el("div", {
                                class: "modal-actions",
                            });
                            const cancel = el(
                                "button",
                                { class: "modal-btn cancel", type: "button" },
                                "Annuler",
                            );
                            cancel.addEventListener("click", close);
                            const submit = el(
                                "button",
                                { class: "modal-btn primary", type: "button" },
                                "Valider",
                            );
                            submit.addEventListener("click", async () => {
                                const token = input.value.trim();
                                if (!/^\d{6}$/.test(token)) {
                                    err.className = "modal-err";
                                    err.style.display = "";
                                    err.textContent =
                                        "Code à 6 chiffres requis.";
                                    return;
                                }
                                submit.disabled = true;
                                submit.textContent = "Validation…";
                                const { error } = await sb.auth.verifyOtp({
                                    phone: pendingPhone,
                                    token,
                                    type: "phone_change",
                                });
                                if (error) {
                                    err.className = "modal-err";
                                    err.style.display = "";
                                    err.textContent = error.message;
                                    submit.disabled = false;
                                    submit.textContent = "Valider";
                                    return;
                                }
                                CURRENT_USER.phone = pendingPhone;
                                if (CURRENT_USER.id)
                                    await sb
                                        .from("profiles")
                                        .update({ phone: pendingPhone })
                                        .eq("id", CURRENT_USER.id);
                                close();
                                renderSettings();
                            });
                            actions.appendChild(cancel);
                            actions.appendChild(submit);
                            modal.appendChild(actions);
                        }
                    };
                    render();
                });
            }

            function modalPasswordChange() {
                openModal((modal, close) => {

                    });
                    const nw = el("input", {
                        class: "modal-input",
                        type: "password",
                        placeholder: "Nouveau mot de passe (6+)",
                        autocomplete: "new-password",
                    });
                    const nw2 = el("input", {
                        class: "modal-input",
                        type: "password",
                        placeholder: "Confirmer le nouveau",
                        autocomplete: "new-password",
                    });
                    modal.appendChild(cur);
                    modal.appendChild(nw);
                    modal.appendChild(nw2);
                    const msg = el("div", { style: "display:none" });
                    modal.appendChild(msg);
                    const actions = el("div", { class: "modal-actions" });
                    const cancel = el(
                        "button",
                        { class: "modal-btn cancel", type: "button" },
                        "Annuler",
                    );
                    cancel.addEventListener("click", close);
                    const submit = el(
                        "button",
                        { class: "modal-btn primary", type: "button" },
                        "Mettre à jour",
                    );
                    submit.addEventListener("click", async () => {
                        msg.style.display = "none";
                        if (nw.value.length < 6) {
                            msg.className = "modal-err";
                            msg.style.display = "";
                            msg.textContent = "6 caractères minimum.";
                            return;
                        }
                        if (nw.value !== nw2.value) {
                            msg.className = "modal-err";
                            msg.style.display = "";
                            msg.textContent =
                                "Les deux champs ne correspondent pas.";
                            return;
                        }
                        submit.disabled = true;
                        submit.textContent = "Vérification…";
                        // verify current
                        const { error: siErr } =
                            await sb.auth.signInWithPassword({
                                email: CURRENT_USER.email,
                                password: cur.value,
                            });
                        if (siErr) {
                            msg.className = "modal-err";
                            msg.style.display = "";
                            msg.textContent = "Mot de passe actuel incorrect.";
                            submit.disabled = false;
                            submit.textContent = "Mettre à jour";
                            return;
                        }
                        submit.textContent = "Mise à jour…";
                        const { error: upErr } = await sb.auth.updateUser({
                            password: nw.value,
                        });
                        if (upErr) {
                            msg.className = "modal-err";
                            msg.style.display = "";
                            msg.textContent = upErr.message;
                            submit.disabled = false;
                            submit.textContent = "Mettre à jour";
                            return;
                        }
                        msg.className = "modal-ok";
                        msg.style.display = "";
                        msg.textContent = "Mot de passe mis à jour.";
                        submit.textContent = "OK";
                        setTimeout(close, 1200);
                    });
                    actions.appendChild(cancel);
                    actions.appendChild(submit);
                    modal.appendChild(actions);
                });
            }

            /* --- AUTHENTICATOR (TOTP) --- */
            async function modalAuthenticator() {
                // Check if TOTP factor exists
                const { data: factorData } = await sb.auth.mfa.listFactors();
                const existing =
                    factorData &&
                    factorData.totp &&
                    factorData.totp.find((f) => f.status === "verified");
                if (existing) {
                    // remove flow
                    openModal((modal, close) => {
                        modal.appendChild(
                            el(
                                "h3",
                                { class: "modal-title" },
                                "Désactiver l'authentificateur",
                            ),
                        );
                        modal.appendChild(
                            el(
                                "p",
                                { class: "modal-desc" },
                                "Confirme pour supprimer l'authentificateur lié à ce compte. Tu pourras en reconfigurer un après.",
                            ),
                        );
                        const msg = el("div", { style: "display:none" });
                        modal.appendChild(msg);
                        const actions = el("div", { class: "modal-actions" });
                        const cancel = el(
                            "button",
                            { class: "modal-btn cancel", type: "button" },
                            "Annuler",
                        );
                        cancel.addEventListener("click", close);
                        const submit = el(
                            "button",
                            { class: "modal-btn danger", type: "button" },
                            "Désactiver",
                        );
                        submit.addEventListener("click", async () => {
                            submit.disabled = true;
                            submit.textContent = "…";
                            const { error } = await sb.auth.mfa.unenroll({
                                factorId: existing.id,
                            });
                            if (error) {
                                msg.className = "modal-err";
                                msg.style.display = "";
                                msg.textContent = error.message;
                                submit.disabled = false;
                                submit.textContent = "Désactiver";
                                return;
                            }
                            close();
                        });
                        actions.appendChild(cancel);
                        actions.appendChild(submit);
                        modal.appendChild(actions);
                    });
                    return;
                }
                // enroll flow
                const { data: enrollData, error: enrollErr } =
                    await sb.auth.mfa.enroll({ factorType: "totp" });
                if (enrollErr) {
                    alert(enrollErr.message);
                    return;
                }
                const factorId = enrollData.id;
                const qr = enrollData.totp.qr_code;
                const secret = enrollData.totp.secret;
                const { data: chData, error: chErr } =
                    await sb.auth.mfa.challenge({ factorId });
                if (chErr) {
                    alert(chErr.message);
                    return;
                }
                const challengeId = chData.id;
                openModal((modal, close) => {
                    modal.appendChild(
                        el(
                            "h3",
                            { class: "modal-title" },
                            "Configurer l'authentificateur",
                        ),
                    );
                    modal.appendChild(
                        el(
                            "p",
                            { class: "modal-desc" },
                            "Scanne le QR avec Google Authenticator (ou entre la clé manuellement), puis saisis le code à 6 chiffres.",
                        ),
                    );
                    const qrWrap = el("div", { class: "modal-qr" });
                    qrWrap.innerHTML = qr;
                    modal.appendChild(qrWrap);
                    modal.appendChild(
                        el("div", { class: "modal-secret" }, secret),
                    );
                    const input = el("input", {
                        class: "modal-input",
                        type: "text",
                        inputmode: "numeric",
                        maxlength: "6",
                        placeholder: "123456",
                    });
                    modal.appendChild(input);
                    const msg = el("div", { style: "display:none" });
                    modal.appendChild(msg);
                    const actions = el("div", { class: "modal-actions" });
                    const cancel = el(
                        "button",
                        { class: "modal-btn cancel", type: "button" },
                        "Annuler",
                    );
                    cancel.addEventListener("click", async () => {
                        await sb.auth.mfa.unenroll({ factorId });
                        close();
                    });
                    const submit = el(
                        "button",
                        { class: "modal-btn primary", type: "button" },
                        "Activer",
                    );
                    submit.addEventListener("click", async () => {
                        const code = input.value.trim();
                        if (!/^\d{6}$/.test(code)) {
                            msg.className = "modal-err";
                            msg.style.display = "";
                            msg.textContent = "Code à 6 chiffres requis.";
                            return;
                        }
                        submit.disabled = true;
                        submit.textContent = "Validation…";
                        const { error } = await sb.auth.mfa.verify({
                            factorId,
                            challengeId,
                            code,
                        });
                        if (error) {
                            msg.className = "modal-err";
                            msg.style.display = "";
                            msg.textContent = error.message;
                            submit.disabled = false;
                            submit.textContent = "Activer";
                            return;
                        }
                        msg.className = "modal-ok";
                        msg.style.display = "";
                        msg.textContent = "Authentificateur activé.";
                        setTimeout(close, 1100);
                    });
                    actions.appendChild(cancel);
                    actions.appendChild(submit);
                    modal.appendChild(actions);
                });
            }

            function launchConfetti() {
                const canvas = document.getElementById("confetti-canvas");
                canvas.style.display = "";
                const ctx = canvas.getContext("2d");
                const parent = canvas.parentElement;
                const rect = parent.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                const colors = [
                    "#ffd27a",
                    "#ff8ab8",
                    "#7c5ef7",
                    "#4f6ef7",
                    "#8be0ff",
                    "#4fc87a",
                ];
                const N = 120;
                const parts = Array.from({ length: N }, () => ({
                    x: canvas.width / 2 + (Math.random() - 0.5) * 40,
                    y: canvas.height / 3,
                    vx: (Math.random() - 0.5) * 10,
                    vy: Math.random() * -12 - 4,
                    g: 0.35,
                    size: 5 + Math.random() * 6,
                    rot: Math.random() * Math.PI * 2,
                    vr: (Math.random() - 0.5) * 0.3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 0,
                }));
                const start = performance.now();
                function frame(now) {
                    const t = now - start;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    parts.forEach((p) => {
                        p.vy += p.g;
                        p.x += p.vx;
                        p.y += p.vy;
                        p.rot += p.vr;
                        p.life = t;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = Math.max(0, 1 - t / 2800);
                        ctx.fillRect(
                            -p.size / 2,
                            -p.size / 2,
                            p.size,
                            p.size * 0.5,
                        );
                        ctx.restore();
                    });
                    if (t < 2800) requestAnimationFrame(frame);
                    else {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        canvas.style.display = "none";
                    }
                }
                requestAnimationFrame(frame);
            }

            async function loadBlockedUsers() {
                if (!CURRENT_USER.id) return [];

                    .from("blocked_users")
                    .select("blocked_id, created_at")
                    .eq("user_id", CURRENT_USER.id)
                    .order("created_at", { ascending: false });
                if (error) {
                    console.error("[blocked list]", error);
                    return [];

                if (!rows || rows.length === 0) return [];
                const ids = rows.map((r) => r.blocked_id);
                const { data: profs } = await sb
                    .from("profiles")
                    .select("id, name, avatar_url")
                    .in("id", ids);
                const byId = {};
                (profs || []).forEach((p) => (byId[p.id] = p));
                return rows.map((r) => ({
                    id: r.blocked_id,
                    name:
                        (byId[r.blocked_id] && byId[r.blocked_id].name) ||
                        "Utilisateur",
                    avatar_url:

                            const ok = await unblockUser(u.id);
