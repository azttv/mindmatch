                padding: 14px 16px;
                border-radius: 12px;
                background: var(--gradient);
                color: #fff;
                font-size: 14.5px;
                font-weight: 600;
                margin-top: 4px;
                transition: all 150ms ease;
                box-shadow: 0 6px 18px rgba(124, 94, 247, 0.35);
            }
            .auth-submit:hover {
                transform: translateY(-1px);
            }
            .auth-submit:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                transform: none;
            }
            .auth-switch {
                text-align: center;
                font-size: 13px;
                color: var(--text-muted);
                margin-top: 4px;
            }
            .auth-switch-link {
                color: var(--accent-2);
                font-weight: 600;
                cursor: pointer;
                text-decoration: underline;
                text-underline-offset: 3px;
                background: none;
                border: none;
                font-size: inherit;
            }
            .auth-error {
                padding: 10px 12px;
                border-radius: 10px;
                background: rgba(247, 79, 110, 0.1);
                border: 1px solid rgba(247, 79, 110, 0.3);
                color: var(--danger);
                font-size: 13px;
                line-height: 1.4;
            }
            .auth-success {
                padding: 10px 12px;
                border-radius: 10px;
                background: rgba(79, 200, 122, 0.1);
                border: 1px solid rgba(79, 200, 122, 0.3);
                color: var(--success);
                font-size: 13px;
                line-height: 1.4;
            }
            .auth-loader {
                position: fixed;
                inset: 0;
                background: var(--bg);
                display: grid;
                place-items: center;
                z-index: 300;
            }
            .auth-loader-spin {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: 3px solid var(--border);
                border-top-color: var(--accent-2);
                animation: auth-spin 900ms linear infinite;
            }
            @keyframes auth-spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* ============================================================
     SETTINGS PANEL
  ============================================================ */
            .settings-panel {
                position: absolute;
                inset: 0;
                background: var(--bg);
                z-index: 50;
                display: flex;
                flex-direction: column;
                transform: translateX(100%);
                transition: transform 280ms cubic-bezier(0.22, 0.61, 0.36, 1);
                overflow: hidden;
            }
            .settings-panel.open {
                transform: translateX(0);
            }
            .settings-header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: calc(var(--safe-top) + 16px) 16px 14px;
                border-bottom: 1px solid var(--border);
                background: rgba(13, 13, 20, 0.92);
                backdrop-filter: blur(10px);
                flex-shrink: 0;
            }
            .settings-back {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                display: grid;
                place-items: center;
                background: var(--surface-2);
                border: 1px solid var(--border);
                color: var(--text);
                transition: background 150ms ease;
                flex-shrink: 0;
            }
            .settings-back:hover {
                background: var(--surface-3);
            }
            .settings-header-title {
                font-size: 17px;
                font-weight: 700;
                letter-spacing: -0.02em;
                margin: 0;
            }
            .settings-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 20px 16px calc(var(--safe-bottom) + 20px);
            }
            .settings-category {
                margin-bottom: 22px;
            }
            .settings-category-title {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
                font-weight: 600;
                margin: 0 4px 10px;
            }
            .settings-group {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                overflow: hidden;
            }
            .settings-row {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 14px 16px;
                cursor: pointer;
                transition: background 150ms ease;
                border-bottom: 1px solid var(--border);
                color: var(--text);
                font-size: 14px;
                width: 100%;
                text-align: left;
                background: transparent;
            }
            .settings-row:last-child {
                border-bottom: none;
            }
            .settings-row:hover {
                background: var(--surface-2);
            }
            .settings-row-icon {
                width: 32px;
                height: 32px;
                border-radius: 10px;
                background: var(--surface-2);
                display: grid;
                place-items: center;
                color: var(--accent-2);
                font-size: 15px;
                flex-shrink: 0;
            }
            .settings-row-label {
                flex: 1;
                font-weight: 500;
            }
            .settings-row-value {
                color: var(--text-muted);
                font-size: 13px;
                margin-right: 4px;
            }
            .settings-row-chev {
                color: var(--text-faint);
                font-size: 13px;
                flex-shrink: 0;
            }
            .settings-row.danger {
                color: var(--danger);
            }
            .settings-row.danger .settings-row-icon {
                color: var(--danger);
                background: rgba(247, 79, 110, 0.12);
            }

            /* PREMIUM PAGE */
            .pro-page {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 20px 16px 30px;
                min-height: 100%;
            }
            .pro-page-title {
                font-size: 40px;
                font-weight: 800;
                margin: 14px 0 6px;
                letter-spacing: -0.03em;
                background: linear-gradient(
                    135deg,
                    #ffd27a 0%,
                    #ff8ab8 40%,
                    #7c5ef7 80%,
                    #4f6ef7 100%
                );
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                filter: drop-shadow(0 0 22px rgba(255, 138, 184, 0.35));
                animation: pro-glow 2.8s ease-in-out infinite;
            }
            @keyframes pro-glow {
                0%,
                100% {
                    filter: drop-shadow(0 0 22px rgba(255, 138, 184, 0.35));
                }
                50% {
                    filter: drop-shadow(0 0 36px rgba(124, 94, 247, 0.65));
                }
            }
            .pro-page-sub {
                color: var(--text-muted);
                font-size: 14.5px;
                max-width: 320px;
                margin: 0 0 24px;
            }
            .pro-perks {
                width: 100%;
                max-width: 360px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 26px;
            }
            .pro-perk {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 13px 14px;
                border-radius: 14px;
                background: var(--surface);
                border: 1px solid var(--border);
                text-align: left;
            }
            .pro-perk-icon {
                color: var(--accent-2);
                font-size: 15px;
                flex-shrink: 0;
                padding-top: 2px;
            }
            .pro-perk-title {
                font-weight: 600;
                font-size: 14px;
                margin: 0 0 2px;
            }
            .pro-perk-desc {
                font-size: 12.5px;
                color: var(--text-muted);
                line-height: 1.4;
                margin: 0;
            }
            .pro-cta {
                position: relative;
                width: 100%;
                max-width: 360px;
                padding: 15px 20px;
                border-radius: 14px;
                background: var(--gradient);
                color: #fff;
                font-size: 15px;
                font-weight: 700;
                letter-spacing: 0.01em;
                box-shadow: 0 10px 28px rgba(124, 94, 247, 0.45);
                overflow: hidden;
                transition: transform 150ms ease;
            }
            .pro-cta:hover {
                transform: translateY(-1px);
            }
            .pro-cta::after {
                content: "";
                position: absolute;
                top: 0;
                left: -60%;
                width: 40%;
                height: 100%;
                background: linear-gradient(
                    90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.35) 50%,
                    transparent 100%
                );
                animation: pro-sweep 4s infinite;
                pointer-events: none;
            }
            @keyframes pro-sweep {
                0% {
                    left: -60%;
                }
                45% {
                    left: 140%;
                }
                100% {
                    left: 140%;
                }
            }
            .pro-decline {
                background: none;
                border: none;
                color: var(--text-muted);
                font-size: 13px;
                margin-top: 16px;
                text-decoration: underline;
                text-underline-offset: 3px;
                cursor: pointer;
                opacity: 0;
                animation: pro-decline-in 600ms ease forwards;
                animation-delay: 4s;
            }
            @keyframes pro-decline-in {
                to {
                    opacity: 1;
                }
            }
            .pro-cta.downgrade {
                background: transparent;
                border: 1px solid var(--danger);
                color: var(--danger);
                box-shadow: none;
            }
            .pro-cta.downgrade::after {
                display: none;
            }

            /* COMPTE SUB-PAGE */
            .settings-sub-title {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
                font-weight: 600;
                margin: 18px 4px 8px;
            }
            .settings-sub-title:first-child {
                margin-top: 4px;
            }

            /* PREMIUM BADGE ON AVATAR */
            .profile-avatar-wrap {
                position: relative;
                display: inline-block;
            }
            .pro-badge {
                position: absolute;
                bottom: 2px;
                right: 2px;
                width: 34px;
                height: 34px;
                border-radius: 50%;
                background: linear-gradient(
                    135deg,
                    #ffd27a,
                    #ff8ab8 50%,
                    #7c5ef7
                );
                display: grid;
                place-items: center;
                color: #fff;
                font-size: 16px;
                box-shadow:
                    0 4px 14px rgba(124, 94, 247, 0.55),
                    0 0 0 3px var(--bg);
                animation: pro-badge-in 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .avatar-upload-hint {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                background: rgba(0, 0, 0, 0.35);
                display: grid;
                place-items: center;
                color: #fff;
                font-size: 22px;
                opacity: 0;
                transition: opacity 180ms ease;
                pointer-events: none;
            }
            .profile-avatar-big:hover .avatar-upload-hint {
                opacity: 1;
            }
            @keyframes pro-badge-in {
                from {
                    transform: scale(0) rotate(-180deg);
                    opacity: 0;
                }
                to {
                    transform: scale(1) rotate(0);
                    opacity: 1;
                }
            }

            /* MODAL */
            .modal-backdrop {
                position: absolute;
                inset: 0;
                background: rgba(5, 5, 10, 0.75);
                backdrop-filter: blur(6px);
                z-index: 100;
                display: grid;
                place-items: center;
                padding: 20px;
                animation: modal-fade 200ms ease;
            }
            @keyframes modal-fade {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            .modal {
                width: 100%;
                max-width: 380px;
                background: var(--surface);
                border: 1px solid var(--border-strong);
                border-radius: 20px;
                padding: 22px 20px 20px;
                display: flex;
                flex-direction: column;
                gap: 14px;
                max-height: 92%;
                overflow-y: auto;
                animation: modal-pop 240ms cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            @keyframes modal-pop {
                from {
                    transform: scale(0.9);
                    opacity: 0;
                }
                to {
                    transform: scale(1);
                    opacity: 1;
                }
            }
            .modal-title {
                font-size: 17px;
                font-weight: 700;
                letter-spacing: -0.01em;
                margin: 0;
            }
            .modal-desc {
                font-size: 13.5px;
                color: var(--text-muted);
                line-height: 1.5;
                margin: -4px 0 2px;
            }
            .modal-desc.danger {
                color: var(--danger);
            }
            .modal-input {
                width: 100%;
                padding: 12px 14px;
                border-radius: 12px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                color: var(--text);
                font-size: 14px;
                font-family: inherit;
            }
            .modal-input:focus {
                border-color: var(--accent);
            }
            .modal-actions {
                display: flex;
                gap: 10px;
                margin-top: 4px;
            }
            .modal-btn {
                flex: 1;
                padding: 12px 14px;
                border-radius: 12px;
                font-size: 14px;
                font-weight: 600;
                transition: all 150ms ease;
                border: 1px solid transparent;
            }
            .modal-btn.cancel {
                background: var(--surface-2);
                border-color: var(--border);
                color: var(--text);
            }
            .modal-btn.cancel:hover {
                background: var(--surface-3);
            }
            .modal-btn.primary {
                background: var(--gradient);
                color: #fff;
                box-shadow: 0 6px 16px rgba(124, 94, 247, 0.35);
            }
            .modal-btn.danger {
                background: var(--danger);
                color: #fff;
            }
            .modal-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .modal-qr {
                display: grid;
                place-items: center;
                padding: 16px;
                background: #fff;
                border-radius: 14px;
            }
            .modal-qr svg {
                width: 180px;
                height: 180px;
            }
            .modal-secret {
                font-family: ui-monospace, Menlo, monospace;
                font-size: 13px;
                padding: 10px 12px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: 10px;
                text-align: center;
                word-break: break-all;
                user-select: all;
            }
            .modal-err {
                padding: 9px 12px;
                border-radius: 10px;
                background: rgba(247, 79, 110, 0.12);
                border: 1px solid rgba(247, 79, 110, 0.3);
                color: var(--danger);
                font-size: 13px;
            }
            .modal-ok {
                padding: 9px 12px;
                border-radius: 10px;
                background: rgba(79, 200, 122, 0.12);
                border: 1px solid rgba(79, 200, 122, 0.3);
                color: var(--success);
                font-size: 13px;
            }

            /* CONFETTI */
            .confetti-canvas {
                position: absolute;
                inset: 0;
                pointer-events: none;
                z-index: 60;
            }

            /* ============================================================
     CONVERSATION DROPDOWN + REPORT/BLOCK
  ============================================================ */
            .conv-menu-btn {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: var(--surface-2);
                border: 1px solid var(--border);
                color: var(--text-muted);
                display: grid;
                place-items: center;
                flex-shrink: 0;
                transition:
                    transform 220ms cubic-bezier(0.34, 1.56, 0.64, 1),
                    background 150ms ease,
                    color 150ms ease;
                cursor: pointer;
                font-size: 11px;
            }
            .conv-menu-btn:hover {
                background: var(--surface-3);
                color: var(--text);
            }
            .conv-menu-btn.open {
                transform: rotate(180deg);
                background: var(--surface-3);
                color: var(--text);
            }
            .conv-menu-wrap {
                position: relative;
                flex-shrink: 0;
            }
            .conv-menu-pop {
                position: absolute;
                top: calc(100% + 6px);
                right: 0;
                background: var(--surface);
                border: 1px solid var(--border-strong);
                border-radius: 12px;
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
                padding: 6px;
                min-width: 150px;
                z-index: 30;
                display: flex;
                flex-direction: column;
                gap: 2px;
                animation: conv-pop-in 180ms cubic-bezier(0.22, 0.61, 0.36, 1);
            }
            @keyframes conv-pop-in {
                from {
                    opacity: 0;
                    transform: translateY(-6px) scale(0.96);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            .conv-menu-item {
                padding: 9px 12px;
                border-radius: 8px;
                font-size: 13.5px;
                font-weight: 500;
                color: var(--danger);
                background: none;
                border: none;
                text-align: left;
                cursor: pointer;
                transition: background 120ms ease;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .conv-menu-item:hover {
                background: rgba(247, 79, 110, 0.1);
            }
            .conv-menu-item i {
                font-size: 12px;
                width: 14px;
                text-align: center;
            }

            /* REPORT MODAL */
            .report-cat-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 8px;
                max-height: 320px;
                overflow-y: auto;
                padding-right: 4px;
            }
            .report-cat-btn {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 14px;
                border-radius: 12px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                color: var(--text);
                text-align: left;
                cursor: pointer;
                transition: all 150ms ease;
                font-size: 14px;
                font-family: inherit;
            }
            .report-cat-btn:hover {
                background: var(--surface-3);
                border-color: var(--accent);
                transform: translateX(2px);
            }
            .report-cat-icon {
                width: 30px;
                height: 30px;
                border-radius: 9px;
                background: rgba(247, 79, 110, 0.12);
                color: var(--danger);
                display: grid;
                place-items: center;
                flex-shrink: 0;
                font-size: 13px;
            }
            .report-cat-label {
                flex: 1;
                font-weight: 500;
            }
            .report-cat-chev {
                color: var(--text-faint);
                font-size: 11px;
            }
            .report-breadcrumb {
                display: flex;
                align-items: center;
                gap: 8px;
                color: var(--text-muted);
                font-size: 12px;
                margin: -4px 0 2px;
            }
            .report-breadcrumb button {
                color: var(--accent-2);
                background: none;
                border: none;
                font: inherit;
                cursor: pointer;
                padding: 0;
            }
            .report-textarea {
                width: 100%;
                min-height: 80px;
                resize: vertical;
                padding: 10px 12px;
                border-radius: 10px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                color: var(--text);
                font-size: 14px;
                font-family: inherit;
            }
            .block-list {
                display: flex;
                flex-direction: column;
                gap: 6px;
                font-size: 13px;
                color: var(--text-muted);
                padding-left: 8px;
            }
            .block-list li {
                line-height: 1.5;
            }

            /* BLOCKED LIST in settings */
            .blocked-row {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px;
                border-bottom: 1px solid var(--border);
            }
            .blocked-row:last-child {
                border-bottom: none;
            }
            .blocked-avatar {
                width: 38px;
                height: 38px;
                border-radius: 50%;
                background: var(--gradient);
                display: grid;
                place-items: center;
                color: #fff;
                font-weight: 600;
                font-size: 14px;
                flex-shrink: 0;
                overflow: hidden;
            }
            .blocked-avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .blocked-name {
                flex: 1;
                font-size: 14px;
                font-weight: 500;
            }
            .blocked-unblock {
                padding: 7px 14px;
                border-radius: 9px;
                background: var(--surface-2);
                border: 1px solid var(--border-strong);
                color: var(--text);
                font-size: 12.5px;
                font-weight: 600;
                cursor: pointer;
            }
            .blocked-unblock:hover {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
            .blocked-empty {
                padding: 32px 20px;
                text-align: center;
                color: var(--text-muted);
                font-size: 13.5px;
            }

            /* SPIDER FLIP CARD */
            .flip-card {
                perspective: 1200px;
                transition: transform 600ms cubic-bezier(0.22, 0.61, 0.36, 1);
            }
            .flip-card.zooming {
                transform: scale(1.04);
            }
            .flip-inner {
                position: relative;
                width: 100%;
                transform-style: preserve-3d;
                transition: transform 800ms cubic-bezier(0.65, 0, 0.35, 1);
                min-height: 260px;
            }
            .flip-card.flipped .flip-inner {
                transform: rotateY(180deg);
            }
            .flip-front,
            .flip-back {
                width: 100%;
                backface-visibility: hidden;
                -webkit-backface-visibility: hidden;
            }
            .flip-back {
                position: absolute;
                inset: 0;
                transform: rotateY(180deg);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 20px 16px;
                text-align: center;
            }
            .spider-wrap {
                position: relative;
                width: 220px;
                height: 220px;
                margin: 4px auto 0;
            }
            .spider-svg {
                width: 100%;
                height: 100%;
                display: block;
            }
            .spider-svg.blurred {
                filter: blur(9px);
                opacity: 0.75;
            }
            .spider-axis {
                stroke: var(--border-strong);
                stroke-width: 1;
            }
            .spider-ring {
                stroke: var(--border);
                stroke-width: 1;
                fill: none;
            }
            .spider-poly {
                fill: url(#spiderGrad);
                stroke: var(--accent-2);
                stroke-width: 2;
                opacity: 0.7;
            }
            .spider-axis-label {
                font-size: 10px;
                fill: var(--text-muted);
                text-anchor: middle;
                font-weight: 600;
            }
            .spider-lock-overlay {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
                color: var(--text);
            }
            .spider-lock-icon {
                font-size: 22px;
                background: var(--gradient);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
            .spider-title {
                font-size: 15px;
                font-weight: 700;
                margin: 0;
                letter-spacing: -0.01em;
            }
            .spider-sub {
                font-size: 12px;
                color: var(--text-muted);
                margin: 0 0 10px;
            }
            .spider-go-pro {
                padding: 9px 16px;
                border-radius: 10px;
                background: var(--gradient);
                color: #fff;
                font-size: 13px;
                font-weight: 600;
                border: none;
                cursor: pointer;
                box-shadow: 0 4px 12px rgba(124, 94, 247, 0.45);
            }

            /* PRO PAGE fade→zoom transition */
            .pro-page.morphing .pro-perks,
            .pro-page.morphing .pro-cta,
            .pro-page.morphing .pro-decline,
            .pro-page.morphing .pro-page-sub {
                animation: pro-fade-out 340ms ease forwards;
            }
            @keyframes pro-fade-out {
                to {
                    opacity: 0;
                    transform: translateY(-8px);
                }
            }
            .pro-page.morphing .pro-page-title {
                animation: pro-title-shrink 380ms ease forwards;
            }
            @keyframes pro-title-shrink {
                to {
                    transform: scale(0.6);
                    opacity: 0;
                }
            }
            .pro-subscribe {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 14px;
                padding: 28px 18px;
                opacity: 0;
                transform: scale(0.8);
                animation: pro-sub-in 500ms 380ms
                    cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            }
            @keyframes pro-sub-in {
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }
            .pro-sub-title {
                font-size: 32px;
                font-weight: 800;
                margin: 0;
                background: linear-gradient(
                    135deg,
                    #ffd27a,
                    #ff8ab8 40%,
                    #7c5ef7
                );
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                letter-spacing: -0.02em;
            }
            .pro-price {
                font-size: 48px;
                font-weight: 800;
                letter-spacing: -0.03em;
                margin: 6px 0 -4px;
            }
            .pro-price-unit {
                font-size: 15px;
                color: var(--text-muted);
                font-weight: 500;
            }
            .pro-plan-card {
                width: 100%;
                max-width: 320px;
                padding: 18px;
                border-radius: 16px;
                background: var(--surface);
                border: 1px solid var(--border-strong);
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .pro-plan-feature {
                display: flex;
                gap: 10px;
                align-items: center;
                font-size: 13.5px;
                color: var(--text);
            }
            .pro-plan-feature i {
                color: var(--success);
                font-size: 12px;
            }
            .pro-pay-btn {
                width: 100%;
                max-width: 320px;
                padding: 15px;
                border-radius: 14px;
                background: var(--gradient);
                color: #fff;
                font-size: 15px;
                font-weight: 700;
                border: none;
                cursor: pointer;
                box-shadow: 0 10px 24px rgba(124, 94, 247, 0.5);
            }
            .pro-back-to-perks {
                background: none;
                border: none;
                color: var(--text-muted);
                font-size: 12.5px;
                margin-top: 6px;
                cursor: pointer;
                text-decoration: underline;
            }

            /* ============================================================
     BOTTOM NAV
  ============================================================ */
            .bottom-nav {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: calc(var(--nav-height) + var(--safe-bottom));
                padding-bottom: var(--safe-bottom);
                background: rgba(13, 13, 20, 0.88);
                backdrop-filter: blur(20px) saturate(180%);
                -webkit-backdrop-filter: blur(20px) saturate(180%);
                border-top: 1px solid var(--border);
                display: flex;
                align-items: stretch;
                z-index: 20;
            }
            .nav-btn {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 3px;
                color: var(--text-faint);
                position: relative;
                transition: color 180ms ease;
            }
            .nav-btn:hover {
                color: var(--text-muted);
            }
            .nav-btn.active {
                color: var(--accent-2);
            }
            .nav-btn.active::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 28px;
                height: 3px;
                border-radius: 0 0 3px 3px;
                background: var(--gradient);
            }
            .nav-btn svg {
                width: 24px;
                height: 24px;
            }
            .nav-btn .nav-neuron-icon {
                width: 28px;
                height: 28px;
                margin-bottom: -2px;
            }
            .nav-label {
                font-size: 10.5px;
                font-weight: 500;
                letter-spacing: -0.01em;
            }
            .nav-badge {
                position: absolute;
                top: 8px;
                right: calc(50% - 22px);
                min-width: 16px;
                height: 16px;
                padding: 0 4px;
                border-radius: 999px;
                background: var(--danger);
                color: #fff;
                font-size: 10px;
                font-weight: 700;
                display: grid;
                place-items: center;
                box-shadow: 0 0 0 2px var(--bg);
                animation: pulse 2s ease-in-out infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    box-shadow:
                        0 0 0 2px var(--bg),
                        0 0 0 0 rgba(247, 79, 110, 0.5);
                }
                50% {
                    box-shadow:
                        0 0 0 2px var(--bg),
                        0 0 0 6px rgba(247, 79, 110, 0);
                }
            }

            .nav-btn.locked {
                opacity: 0.45;
            }
            .nav-btn .nav-lock {
                position: absolute;
                top: 6px;
                right: calc(50% - 22px);
                width: 14px;
                height: 14px;
                border-radius: 999px;
                background: var(--surface-3);
                color: var(--text-muted);
                display: grid;
                place-items: center;
                border: 1px solid var(--border);
            }
            .nav-btn.locked .nav-lock svg {
                width: 8px;
                height: 8px;
                display: block;
            }
            .nav-btn:not(.locked) .nav-lock {
                display: none;
            }

            /* =====================================================
               VOICE MODE — orb-style fullscreen overlay
            ===================================================== */
            .neuron-mic {
                width: 38px;
                height: 38px;
                border-radius: 50%;
                border: 1px solid rgba(255, 255, 255, 0.12);
                background: rgba(255, 255, 255, 0.04);
                color: #e9e9f0;
                display: grid;
                place-items: center;
                cursor: pointer;
                transition: all 0.18s ease;
                margin-right: 6px;
                flex: 0 0 auto;
            }
            .neuron-mic:hover {
                background: rgba(255, 255, 255, 0.08);
            }
            .neuron-mic.is-disabled {
                opacity: 0.35;
                pointer-events: none;
            }

            /* === FULLSCREEN OVERLAY === */
            .vc-overlay {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: space-between;
                padding: 56px 24px 64px;
                background: radial-gradient(
                    ellipse 80% 60% at 50% 35%,
                    #2a1845 0%,
                    #150a25 45%,
                    #07040d 100%
                );
                -webkit-backdrop-filter: blur(24px);
                backdrop-filter: blur(24px);
                overflow: hidden;
            }
            .vc-overlay.is-open {
                display: flex;
                animation: vc-fadein 0.42s ease-out;
            }
            @keyframes vc-fadein {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            /* Soft ambient color wash that drifts behind the orb */
            .vc-overlay::before {
                content: "";
                position: absolute;
                inset: -30%;
                background:
                    radial-gradient(
                        circle at 30% 20%,
                        rgba(255, 90, 170, 0.18),
                        transparent 50%
                    ),
                    radial-gradient(
                        circle at 75% 80%,
                        rgba(120, 60, 220, 0.15),
                        transparent 55%
                    );
                animation: vc-drift 18s ease-in-out infinite alternate;
                pointer-events: none;
                z-index: 0;
            }
            @keyframes vc-drift {
                from {
                    transform: translate(0, 0) scale(1);
                }
                to {
                    transform: translate(4%, -3%) scale(1.05);
                }
            }

            .vc-status {
                position: relative;
                z-index: 2;
                color: rgba(245, 235, 250, 0.92);
                font-size: 15px;
                font-weight: 500;
                letter-spacing: 0.4px;
                text-align: center;
                min-height: 22px;
                margin-top: 8px;
                font-family: inherit;
            }

            /* === ORB === */
            .vc-stage {
                position: relative;
                z-index: 1;
                width: min(72vw, 320px);
                aspect-ratio: 1;
                display: grid;
                place-items: center;
                margin: auto 0;
            }

            .vc-orb {
                position: relative;
                width: 100%;
                height: 100%;
                display: grid;
                place-items: center;
                animation: vc-breathe 4.2s ease-in-out infinite;
                will-change: transform;
            }
            @keyframes vc-breathe {
                0%,
                100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.04);
                }
            }

            /* Outermost soft halo — biggest reaction to audio */
            .vc-orb-aura {
                position: absolute;
                inset: -10%;
                border-radius: 50%;
                background: radial-gradient(
                    circle at 50% 50%,
                    rgba(255, 100, 175, 0.55) 0%,
                    rgba(190, 60, 200, 0.28) 40%,
                    rgba(80, 30, 140, 0) 75%
                );
                filter: blur(28px);
                transform: scale(1);
                transition: transform 0.09s ease-out;
                will-change: transform;
                pointer-events: none;
            }

            /* Mid glow ring — adds depth */
            .vc-orb-glow {
                position: absolute;
                inset: 8%;
                border-radius: 50%;
                background: radial-gradient(
                    circle at 50% 55%,
                    rgba(255, 150, 200, 0.85) 0%,
                    rgba(220, 80, 170, 0.55) 35%,
                    rgba(120, 40, 160, 0.2) 70%,
                    rgba(60, 20, 100, 0) 100%
                );
                filter: blur(8px);
                transform: scale(1);
                transition: transform 0.08s ease-out;
                will-change: transform;
                pointer-events: none;
            }

            /* Solid orb body */
            .vc-orb-core {
                position: relative;
                width: 62%;
                height: 62%;
                border-radius: 50%;
                background: radial-gradient(
                    circle at 32% 28%,
                    rgba(255, 235, 245, 1) 0%,
                    rgba(255, 165, 205, 0.95) 22%,
                    rgba(225, 95, 175, 0.85) 50%,
                    rgba(150, 50, 145, 0.7) 78%,
                    rgba(70, 25, 95, 0.6) 100%
                );
                box-shadow:
                    inset 0 -20px 40px rgba(80, 30, 110, 0.55),
                    inset 18px 18px 50px rgba(255, 220, 235, 0.35),
                    0 0 60px 4px rgba(255, 110, 180, 0.45);
                transform: scale(1);
                transition: transform 0.07s ease-out;
                will-change: transform;
            }

            /* Highlight reflection on the core */
            .vc-orb-core::before {
                content: "";
                position: absolute;
                top: 12%;
                left: 18%;
                width: 38%;
                height: 28%;
                border-radius: 50%;
                background: radial-gradient(
                    ellipse,
                    rgba(255, 255, 255, 0.55) 0%,
                    rgba(255, 255, 255, 0) 70%
                );
                pointer-events: none;
                filter: blur(2px);
            }

            /* Subtle moving shimmer */
            .vc-orb-core::after {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 50%;
                background: conic-gradient(
                    from 0deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.06) 25%,
                    rgba(255, 255, 255, 0) 50%,
                    rgba(255, 255, 255, 0.04) 75%,
                    rgba(255, 255, 255, 0) 100%
                );
                animation: vc-shimmer 9s linear infinite;
                mix-blend-mode: screen;
                pointer-events: none;
            }
            @keyframes vc-shimmer {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }

            /* === CONTROLS === */
            .vc-controls {
                position: relative;
                z-index: 2;
                display: flex;
                gap: 28px;
                align-items: center;
                justify-content: center;
            }

            .vc-btn {
                width: 64px;
                height: 64px;
                border-radius: 50%;
                border: 1px solid rgba(255, 255, 255, 0.16);
                background: rgba(255, 255, 255, 0.06);
                -webkit-backdrop-filter: blur(8px);
                backdrop-filter: blur(8px);
                color: #fff;
                display: grid;
                place-items: center;
                cursor: pointer;
                transition:
                    transform 0.15s ease,
                    background 0.18s ease,
                    border-color 0.18s ease;
                position: relative;
            }
            .vc-btn:hover {
                transform: scale(1.06);
                background: rgba(255, 255, 255, 0.1);
            }
            .vc-btn:active {
                transform: scale(0.97);
            }
            .vc-btn.is-muted {
                background: rgba(255, 80, 110, 0.18);
                border-color: rgba(255, 80, 110, 0.45);
                color: #ff8aa3;
            }
            .vc-btn.is-muted::after {
                content: "";
                position: absolute;
                left: 16px;
                right: 16px;
                top: 50%;
                height: 2.4px;
                background: #ff8aa3;
                transform: rotate(-45deg);
                border-radius: 2px;
            }

            .vc-btn-leave {
                width: 64px;
                height: 64px;
                border-radius: 50%;
                background: #ff3a5e;
                color: #fff;
                border: none;
                display: grid;
                place-items: center;
                cursor: pointer;
                transition:
                    transform 0.15s ease,
                    background 0.18s ease;
                box-shadow: 0 6px 20px rgba(255, 58, 94, 0.35);
            }
            .vc-btn-leave:hover {
                transform: scale(1.06);
                background: #ff5273;
            }
            .vc-btn-leave:active {
                transform: scale(0.97);
            }
            .vc-btn-label {
                margin-top: 8px;
                font-size: 11px;
                color: rgba(245, 235, 250, 0.55);
                text-align: center;
                letter-spacing: 0.4px;
                font-family: inherit;
            }
            .vc-control-stack {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            /* =====================================================
               DEBUG MODE (konami code: ↑↑↓↓←→←→BA)
            ===================================================== */
            .dbg-panel {
                position: fixed;
                top: 0;
                left: 0;
                width: min(420px, 90vw);
                height: 100vh;
                z-index: 10000;
                background: rgba(8, 6, 14, 0.92);
                color: #d8e0e8;
                font-family:
                    ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
                font-size: 11px;
                line-height: 1.45;
                display: flex;
                flex-direction: column;
                border-right: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: 8px 0 32px rgba(0, 0, 0, 0.6);
                -webkit-backdrop-filter: blur(8px);
                backdrop-filter: blur(8px);
                animation: dbg-slidein 0.22s ease-out;
            }
            @keyframes dbg-slidein {
                from {
                    transform: translateX(-100%);
                }
                to {
                    transform: translateX(0);
                }
            }
            .dbg-header {
                padding: 10px 14px 8px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
            }
            .dbg-title {
                font-weight: 700;
                color: #ff5572;
                letter-spacing: 1px;
                font-size: 11px;
            }
            .dbg-sub {
                color: rgba(255, 255, 255, 0.42);
                font-size: 10px;
            }
            .dbg-actions {
                display: flex;
                gap: 6px;
            }
            .dbg-btn {
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.14);
                color: #d8e0e8;
                padding: 4px 8px;
                border-radius: 5px;
                cursor: pointer;
                font-size: 10px;
                font-family: inherit;
                transition: background 0.15s ease;
            }
            .dbg-btn:hover {
                background: rgba(255, 255, 255, 0.08);
            }
            .dbg-mic {
                padding: 8px 14px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            }
            .dbg-mic-label {
                color: rgba(255, 255, 255, 0.5);
                font-size: 10px;
                margin-bottom: 4px;
                display: flex;
                justify-content: space-between;
            }
            .dbg-mic-track {
                position: relative;
                width: 100%;
                height: 8px;
                background: rgba(255, 255, 255, 0.06);
                border-radius: 4px;
                overflow: hidden;
            }
            .dbg-mic-bar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 0%;
                background: linear-gradient(
                    90deg,
                    #4ade80 0%,
                    #facc15 60%,
                    #ef4444 90%
                );
                transition: width 0.05s linear;
            }
            .dbg-state {
                padding: 8px 14px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                display: grid;
                grid-template-columns: max-content 1fr;
                gap: 2px 12px;
                font-size: 10.5px;
            }
            .dbg-state .k {
                color: rgba(255, 255, 255, 0.45);
            }
            .dbg-state .v {
                color: #fff;
                font-weight: 600;
            }
            .dbg-state .v.t {
                color: #4ade80;
            }
            .dbg-state .v.f {
                color: #f87171;
            }
            .dbg-log {
                flex: 1;
                overflow-y: auto;
                padding: 8px 12px 14px;
                font-size: 10.5px;
                white-space: pre-wrap;
                word-break: break-word;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
            }
            .dbg-log::-webkit-scrollbar {
                width: 6px;
            }
            .dbg-log::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.18);
                border-radius: 3px;
            }
            .dbg-line {
                padding: 1px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            }
            .dbg-line.system {
                color: #94a3b8;
            }
            .dbg-line.stt {
                color: #7dd3fc;
            }
            .dbg-line.user {
                color: #4ade80;
                font-weight: 600;
            }
            .dbg-line.chat {
                color: #c084fc;
            }
            .dbg-line.amber {
                color: #f0abfc;
                font-weight: 600;
            }
            .dbg-line.tts {
                color: #fbbf24;
            }
            .dbg-line.error {
                color: #ff6b81;
                font-weight: 700;
            }
            .dbg-line .ts {
                color: rgba(255, 255, 255, 0.32);
                margin-right: 6px;
            }
            .dbg-toast {
                position: fixed;
                top: 18px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 100000;
                padding: 10px 16px;
                background: rgba(255, 85, 114, 0.95);
                color: #fff;
                font-family: ui-monospace, monospace;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 1.5px;
                border-radius: 6px;
                box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
                animation: dbg-toast 1.6s ease-out forwards;
            }
            @keyframes dbg-toast {
                0% {
                    opacity: 0;
                    transform: translate(-50%, -10px);
                }
                15% {
                    opacity: 1;
                    transform: translate(-50%, 0);
                }
                80% {
                    opacity: 1;
                }
                100% {
                    opacity: 0;
                    transform: translate(-50%, -10px);
                }
            }
        </style>
    </head>

            const WORKER_URL = "https://api.mindmatch.fr/";

                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ messages: fullMessages }),

                    const data = await res.json();

                        );
                        if (!r.ok) throw new Error("HTTP " + r.status);
                        SYSTEM_PROMPT_TEMPLATE = await r.text();
                        return SYSTEM_PROMPT_TEMPLATE;
                    } catch (e) {
                        console.error("[system prompt] load failed", e);
                        SYSTEM_PROMPT_TEMPLATE =
                            "Tu es Amber, compagnon conversationnel de MindMatch. " +
                            "Brève, chaleureuse, taquine. Réponds en français." +
                            "[CONTEXTE] Utilisateur : {{USER_LINE}} | " +
                            'Passions : {{PASSIONS}} | Bio : "{{BIO}}"';
                        return SYSTEM_PROMPT_TEMPLATE;
                    } finally {
                        SYSTEM_PROMPT_PROMISE = null;
                    }
                })();
                return SYSTEM_PROMPT_PROMISE;
            }

            async function neuronSystemPrompt() {
                const tpl = await loadSystemPromptTemplate();
                const passions = CURRENT_USER.passions.length
                    ? CURRENT_USER.passions.join(", ")
                    : "non renseignées";
                const userLine = `${CURRENT_USER.name || "inconnu"}${CURRENT_USER.age ? ", " + CURRENT_USER.age + " ans" : ""}${CURRENT_USER.city ? ", " + CURRENT_USER.city : ""}`;
                return tpl
                    .replaceAll("{{USER_LINE}}", userLine)
                    .replaceAll("{{PASSIONS}}", passions)
                    .replaceAll(
                        "{{BIO}}",
                        CURRENT_USER.tagline || "non renseignée",
                    );
            }

            async function fetchContextInsight(chatId, actionId) {
                const conv = CONVERSATIONS[chatId];
                if (!conv) return { text: "Conversation introuvable." };

                const transcript = conv.messages
                    .map(
                        (m) =>
                            `${m.from === "me" ? CURRENT_USER.name : conv.name}: ${typeof m.text === "string" ? m.text : m.text.join(" ")}`,
                    )
                    .join("\n");

                const prompts = {
                    analyze: `Analyse le dernier message de ${conv.name} dans cette conversation. Ton, énergie, signaux implicites. 2 phrases max, français, direct.\n\nTranscript:\n${transcript}`,
                    suggest: `Propose 3 réponses au dernier message de ${conv.name}, avec trois tons différents: "Naturel", "Drôle", "Profond". Chaque réponse = 1 ou 2 phrases maximum. Réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, format exact: {"options":[{"label":"Naturel","text":"..."},{"label":"Drôle","text":"..."},{"label":"Profond","text":"..."}]}\n\nTranscript:\n${transcript}`,
                    read: `Lis entre les lignes du dernier message de ${conv.name}. Qu'est-ce qu'il/elle signale vraiment ? 2 phrases max, français.\n\nTranscript:\n${transcript}`,
                    synapse: `Détecte si une Synapse (alignement profond entre deux esprits) existe dans cette conversation. Réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, format exact: {"text":"explication en 2 phrases max","verdict":"Probabilité de Synapse : faible|moyenne|élevée|très élevée"}\n\nTranscript:\n${transcript}`,
                };

                const raw = await callGPT(
                    [{ role: "user", content: prompts[actionId] }],
                    `Tu es Amber, IA d'analyse conversationnelle pour MindMatch. Concis et perspicace.`,
                );

                if (actionId === "suggest" || actionId === "synapse") {
                    try {
                        return JSON.parse(
                            raw.replace(/```json|```/g, "").trim(),
                        );
                    } catch {
                        return { text: raw };
                    }
                }
                return { text: raw };
            }

            function initials(name) {
                return name
                    .split(" ")
                    .map((p) => p[0])
                    .join("")
                    .slice(0, 2)
                    .toUpperCase();
            }
            function el(tag, attrs = {}, children = []) {
                const node = document.createElement(tag);
                for (const k in attrs) {
                    if (k === "class") node.className = attrs[k];
                    else if (k === "dataset")
                        Object.assign(node.dataset, attrs[k]);
                    else if (k === "style") node.style.cssText = attrs[k];
                    else if (k.startsWith("on"))
                        node.addEventListener(k.slice(2), attrs[k]);
                    else if (k === "html") node.innerHTML = attrs[k];
                    else node.setAttribute(k, attrs[k]);
                }
                (Array.isArray(children) ? children : [children]).forEach(
                    (c) => {
                        if (c == null) return;
                        node.appendChild(
                            typeof c === "string"
                                ? document.createTextNode(c)
                                : c,
                        );
                    },
                );
                return node;
            }
            function svgIcon(inner, w = 18, h = 18, sw = 2) {
                const ns = "http://www.w3.org/2000/svg";
                const svg = document.createElementNS(ns, "svg");
                svg.setAttribute("width", w);
                svg.setAttribute("height", h);
                svg.setAttribute("viewBox", "0 0 24 24");
                svg.setAttribute("fill", "none");
                svg.setAttribute("stroke", "currentColor");
                svg.setAttribute("stroke-width", String(sw));
                svg.setAttribute("stroke-linecap", "round");
                svg.setAttribute("stroke-linejoin", "round");
                svg.innerHTML = inner;
                return svg;
            }
            function neuronMascotSVG(size = 32, extraClass = "") {
                const ns = "http://www.w3.org/2000/svg";
                const svg = document.createElementNS(ns, "svg");
                svg.setAttribute("class", ("neuron-svg " + extraClass).trim());
                svg.setAttribute("viewBox", "-80 -80 160 160");
                svg.setAttribute("width", size);
                svg.setAttribute("height", size);
                const use = document.createElementNS(ns, "use");
                use.setAttribute("href", "#neuron-mascot");
                svg.appendChild(use);
                return svg;
            }
            function flashNeuronState(svg, stateClass, duration = 1300) {
                if (!svg) return;
                svg.classList.add(stateClass);
                setTimeout(() => svg.classList.remove(stateClass), duration);
            }
            function setBrandNeuronState(className, enable) {
                const svg = document.getElementById("brand-mascot");
                if (!svg) return;
                if (enable) svg.classList.add(className);
                else svg.classList.remove(className);
            }

                    bubble.appendChild(el("div", { style: "margin-bottom:6px" }, m.synapse));

                lines.forEach((line, i) => {

            async function submitNeuronMessage(text) {
                if (!text.trim()) return;
                dbgLog("user", "submitNeuronMessage", {
                    text: text.slice(0, 120),
                    chatMode: VOICE.chatMode,
                    exchanges: state.neuron.exchanges,
                });
                state.neuron.inConversation = true;
                state.neuron.messages.push({ from: "user", text });
                state.neuron.exchanges += 1;
                renderNeuron();
                setBrandNeuronState("is-thinking", true);
                showNeuronTyping();

                const gptMessages = state.neuron.messages.map((m) => ({
                    role: m.from === "user" ? "user" : "assistant",
                    content: Array.isArray(m.text) ? m.text.join(" ") : m.text,
                }));
                const reply = await callGPT(
                    gptMessages,
                    await neuronSystemPrompt(),
                );

                hideNeuronTyping();
                setBrandNeuronState("is-thinking", false);

                let synapse = null;
                if (
                    state.neuron.exchanges > 0 &&
                    state.neuron.exchanges % 3 === 0 &&
                    reply.length > 40
                ) {
                    synapse =
                        "Pattern récurrent détecté — jette un œil aux profils récents.";
                }
                state.neuron.messages.push({
                    from: "neuron",
                    text: reply,
                    synapse,
                });
                renderNeuron();
                dbgLog("amber", "reply rendered", {
                    len: reply.length,
                    synapse: !!synapse,
                });
                speakAmber(reply);
                flashNeuronState(
                    document.getElementById("brand-mascot"),
                    "is-sending",
                    500,
                );
                if (synapse)
                    setTimeout(
                        () =>
                            flashNeuronState(
                                document.getElementById("brand-mascot"),
                                "is-synapse",
                                1300,
                            ),
                        300,
                    );
                if (!state.neuron.onboardingDone) {
                    state.neuron.onboardingDone = true;
                    unlockTabs();
                }

                // persist + extract profile
                scheduleSave();
                if (state.neuron.exchanges % 2 === 0) extractProfileFromChat();
            }

                list.innerHTML = "";

                if (entries.length === 0) {
                    list.appendChild(
                        el(

            async function openChat(id) {
                state.activeChatId = id;
                state.activeContextMsgIdx = null;
                state.activeContextAction = null;
                state.contextLoading = false;
                state.contextResult = null;
                const conv = CONVERSATIONS[id];
                if (!conv) return;
                document.getElementById("chat-name").textContent =
                    conv.name || "?";
                const av = document.getElementById("chat-avatar");
                av.innerHTML = "";
                av.style.background = "";
                if (conv.avatar_url) {
                    av.style.background = "transparent";
                    const img = document.createElement("img");
                    img.src = conv.avatar_url;
                    img.style.cssText =
                        "width:100%;height:100%;object-fit:cover;border-radius:50%";
                    av.appendChild(img);
                } else {
                    av.textContent = initials(conv.name || "?");
                    av.style.background = conv.grad || "var(--gradient)";
                }
                renderChatBubbles();
                document.getElementById("chat-view").classList.add("open");
                // mark unread messages as read
                if (conv.unread > 0 && CURRENT_USER.id) {
                    await sb
                        .from("messages")
                        .update({ read_at: new Date().toISOString() })
                        .eq("recipient_id", CURRENT_USER.id)
                        .eq("sender_id", id)
                        .is("read_at", null);
                    conv.unread = 0;
                    computeUnread();
                    renderMessages();
                }
            }
            function closeChat() {
                document.getElementById("chat-view").classList.remove("open");
                state.activeChatId = null;
                state.activeContextMsgIdx = null;
                state.activeContextAction = null;
                state.contextLoading = false;
                state.contextResult = null;
            }

            function renderChatBubbles() {
                const chatMessages = document.getElementById("chat-messages");
                chatMessages.innerHTML = "";
                const conv = CONVERSATIONS[state.activeChatId];
                if (!conv) return;
                conv.messages.forEach((m, idx) => {
                    const row = el("div", { class: `bubble-row ${m.from}` });
                    row.appendChild(
                        el("div", { class: `bubble ${m.from}` }, m.text),
                    );
                    if (m.neuron) {
                        const btn = el("button", {
                            class:
                                "neuron-aside" +
                                (state.activeContextMsgIdx === idx
                                    ? " active"
                                    : ""),
                            "aria-label": "Neuron",
                            onclick: (e) => {
                                e.stopPropagation();
                                toggleContextPanel(idx);
                            },
                        });
                        btn.appendChild(neuronMascotSVG(18));
                        row.appendChild(btn);
                    }
                    chatMessages.appendChild(row);
                    if (state.activeContextMsgIdx === idx)
                        chatMessages.appendChild(buildContextPanel(idx));
                });
                requestAnimationFrame(() => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                });
            }

            function toggleContextPanel(idx) {
                if (state.activeContextMsgIdx === idx) {
                    state.activeContextMsgIdx = null;
                    state.activeContextAction = null;
                    state.contextLoading = false;
                    state.contextResult = null;
                } else {
                    state.activeContextMsgIdx = idx;
                    state.activeContextAction = null;
                    state.contextLoading = false;
                    state.contextResult = null;
                }
                renderChatBubbles();
            }

                            {

                                "button",
                                {

                                    onclick: async () => {
                                        state.activeContextAction = a.id;
                                        state.contextLoading = true;
                                        state.contextResult = null;
                                        renderChatBubbles();
                                        const chatId = state.activeChatId;
                                        const result =

                                            state.activeContextAction === a.id
                                        ) {

                                        { class: "neuron-context-action-icon" },

            function buildSpiderSVG(axes, values, blurred) {
                const ns = "http://www.w3.org/2000/svg";
                const svg = document.createElementNS(ns, "svg");
                svg.setAttribute("viewBox", "-130 -130 260 260");
                svg.setAttribute(
                    "class",
                    "spider-svg" + (blurred ? " blurred" : ""),
                );
                // gradient
                const defs = document.createElementNS(ns, "defs");
                const grad = document.createElementNS(ns, "radialGradient");
                grad.setAttribute("id", "spiderGrad");
                grad.innerHTML =
                    '<stop offset="0%" stop-color="#7c5ef7" stop-opacity="0.6"/>' +
                    '<stop offset="100%" stop-color="#4f6ef7" stop-opacity="0.25"/>';
                defs.appendChild(grad);
                svg.appendChild(defs);
                const R = 95;
                const N = axes.length;
                // rings
                for (let i = 1; i <= 4; i++) {
                    const ring = document.createElementNS(ns, "polygon");
                    const pts = [];
                    for (let k = 0; k < N; k++) {
                        const a = (Math.PI * 2 * k) / N - Math.PI / 2;
                        const r = (R * i) / 4;
                        pts.push(Math.cos(a) * r + "," + Math.sin(a) * r);
                    }
                    ring.setAttribute("points", pts.join(" "));
                    ring.setAttribute("class", "spider-ring");
                    svg.appendChild(ring);
                }
                // axes lines
                for (let k = 0; k < N; k++) {
                    const a = (Math.PI * 2 * k) / N - Math.PI / 2;
                    const line = document.createElementNS(ns, "line");
                    line.setAttribute("x1", 0);
                    line.setAttribute("y1", 0);
                    line.setAttribute("x2", Math.cos(a) * R);
                    line.setAttribute("y2", Math.sin(a) * R);
                    line.setAttribute("class", "spider-axis");
                    svg.appendChild(line);
                }
                // data polygon
                const poly = document.createElementNS(ns, "polygon");
                const dpts = [];
                for (let k = 0; k < N; k++) {
                    const a = (Math.PI * 2 * k) / N - Math.PI / 2;
                    const r = R * values[k];
                    dpts.push(Math.cos(a) * r + "," + Math.sin(a) * r);
                }
                poly.setAttribute("points", dpts.join(" "));
                poly.setAttribute("class", "spider-poly");
                svg.appendChild(poly);
                // axis labels (hidden under blur but kept for Pro)
                for (let k = 0; k < N; k++) {
                    const a = (Math.PI * 2 * k) / N - Math.PI / 2;
                    const t = document.createElementNS(ns, "text");
                    t.setAttribute("x", Math.cos(a) * (R + 18));
                    t.setAttribute("y", Math.sin(a) * (R + 18) + 3);
                    t.setAttribute("class", "spider-axis-label");
                    t.textContent = axes[k];
                    svg.appendChild(t);
                }
                return svg;
            }
